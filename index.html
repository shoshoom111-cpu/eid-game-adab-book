<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مهرجان ألعاب مركز الأدب العربي ⚡</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --teal: #1a9397; --burgundy: #a11f2a; --gold: #c6922a; --bg: #fdfcf9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: manipulation; }
        .main-card { background: white; padding: 1.2rem; border-radius: 30px; box-shadow: 0 15px 45px rgba(0,0,0,0.12); width: 95%; max-width: 400px; text-align: center; border-top: 10px solid var(--teal); max-height: 98vh; overflow-y: auto; position: relative; }
        .logo { width: 100%; max-width: 180px; margin-bottom: 10px; border-radius: 10px; }
        .name-field { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; text-align: center; margin: 10px 0; font-size: 1.1rem; font-weight: bold; outline: none; }
        .start-btn { background: var(--teal); color: white; border: none; padding: 14px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(26, 147, 151, 0.3); transition: 0.2s; margin-top: 5px; text-decoration: none; display: block; }
        .start-btn:disabled { opacity: 0.3; background: #ccc; cursor: not-allowed; }
        #countdown-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 100; display: none; align-items: center; justify-content: center; border-radius: 30px; pointer-events: none; }
        #countdown-text { font-size: 5rem; font-weight: bold; color: var(--teal); }
        .stats-header { display: flex; justify-content: space-around; padding: 8px; background: #f0fafa; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; color: var(--teal); font-weight: bold; }
        .timer-container { background: #eee; height: 8px; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        #timer-line { height: 100%; background: var(--teal); width: 100%; transition: 1s linear; }
        
        /* تحسين شبكة الألغاز لمنع الانزياح البصري */
        .puzzle-grid { display: grid; gap: 0px; margin: 10px auto; background: #eee; border: 4px solid var(--teal); border-radius: 10px; overflow: hidden; width: 280px; height: 380px; }
        .puzzle-piece { cursor: pointer; background-repeat: no-repeat; border: 0.1px solid rgba(255,255,255,0.2); width: 100%; height: 100%; }
        .selected-piece { outline: 4px solid var(--gold); outline-offset: -4px; z-index: 10; transform: scale(0.98); }
        
        .memory-card { height: 85px; background: var(--teal); border-radius: 10px; cursor: pointer; color: white; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; }
    </style>
</head>
<body onload="initApp()">

<div class="main-card">
    <div id="countdown-overlay"><div id="countdown-text">3</div></div>
    <div id="home">
        <img src="https://ibharbooks.com/cdn/shop/collections/markez-adab.png?v=1738877582&width=1024" class="logo">
        <h3 style="color: var(--burgundy);">مهرجان ألعاب الأدب ⚡</h3>
        <p id="tries-text" style="font-size: 0.8rem; color: var(--teal); margin: 5px 0; font-weight: bold;"></p>
        <input type="text" id="player-name" class="name-field" placeholder="اكتب اسمك للبدء..." maxlength="12" oninput="validateInput()">
        <button class="start-btn" id="btn-start" onclick="startFestival()" disabled>ابدأ التحدي 🚀</button>
    </div>

    <div id="game-area" style="display: none;">
        <div class="stats-header">
            <span>⭐ <span id="score-num">0</span></span>
            <span>المرحلة: <span id="lvl-num">1</span>/9</span>
        </div>
        <p id="lvl-desc" style="font-size: 0.8rem; color: var(--teal); font-weight: bold; margin-bottom: 5px;"></p>
        <div class="timer-container"><div id="timer-line"></div></div>
        <div id="game-content"></div>
    </div>
</div>

<script>
    const books = [
       
        { n: "متلازمة فريجولي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/5de7db3d-393a-4443-a7d9-38a313196d3d.jpg" },
        { n: "شجرة العهد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/dc433276-1d38-4214-9e39-041c675d42e1.jpg" },
        { n: "خوف", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/ffc54c3e-9843-4401-be4c-e69329593574.png" },
        { n: "بيتشيني", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/83aea5be-3950-4056-b793-be588d6d6fd8.jpg" },
        { n: "قصّاص", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/32a21b7b-f3c9-400a-bb27-9c104f13f32a.png" },
        { n: "الغيهب", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0ef78de9-8505-472e-867e-0889f360e5f9.jpg" },
        { n: "لأنها كيارا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0579a21c-9a8a-4110-a706-d11747f904cb.png" },
        { n: "قوت", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd25b623-314d-4d3c-9b40-04f32216e854.jpg" },
        { n: "عزير", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0691769a-513b-4e54-8d36-f68ac0f80a1a.png" },
        { n: "بيت الخناس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/679c4645-834e-42f9-a351-8cde94d5a123.png" },
        { n: "حسناء الدم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/c32925e4-2631-4e5f-8041-2097e8b1c36b.jpg" },
        { n: "طائفة الشعيبة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a178864f-98f0-4682-b36e-c21344d49f96.png" },
        { n: "جمنون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/8d3a83f9-7dd5-4939-88d2-31aaa09c4119.jpg" },
        { n: "لج", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/95e264c6-5f16-4d89-b6fa-11bd8866bcda.png" },
        { n: "فندق المقبرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/27ee3566-761c-40f1-b5eb-37df72dd242e.png" },
        { n: "هلاك مبهم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/795aee56-ca9c-45f5-a686-5ee25b243456.jpg" },
        { n: "خربوشة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/80fc325c-722c-47cb-9b4d-d5c7d6642b83.png" },
        { n: "إخلاد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/b8f4b8bc-40a4-477e-a6d0-395053b6e192.jpg" },
        { n: "سكاى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/6485a3a0-8234-4623-b9f8-21b80ccfb175.jpg" },
        { n: "زيروس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/7c8a684e-81a3-4875-9182-41328fd2c313.jpg" },
        { n: "اكاسيا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/625d085f-9b81-4e5f-ab85-b26c08a8bafb.png" },
        { n: "الممر الرابع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/62c01320-e152-4dfd-a780-07aa439264e4.jpg" },
        { n: "ذكريات ومخبوزات", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/16c54ecf-6295-47fd-bd62-ab2d13d61426.png" },
        { n: "بصمة مبهرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/da7534a6-eb04-49c4-841a-4f556322eaed.jpg" },
        { n: "فردوس بوعلي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/edc7725c-73f7-443f-a7b1-872502d3b4c3.jpg" },
        { n: "فندق السيد إنسان", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/97e24005-045e-4ea3-be60-531d1f165259.jpg" }, 
        { n: "الأعمدة والكجة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd3e1d97-4baa-4d29-93ac-a9dbb677cc48.jpg" },
        { n: "نحن موتى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a9bf694e-1c06-4b78-91f4-fc3565077f3e.jpg" },
        { n: "مذكرات محامية", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/18bdeeb2-e433-4ee3-a1a2-1e1cbcd7639d.jpg" },
        { n: "هجرة مزارع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/999e6b0b-cdb9-4f58-a992-a97a68bcddfe.jpg" },
        { n: "بساتين عربستان", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/9b0bb488-fde6-40ce-863b-58b712316992.jpg" },
        { n: "البارون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/fdf02b08-b4cb-4e4d-b594-804bad8cf800.jpg" },
        { n: "رجاء", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/8aec23a8-3c6f-45fd-a68e-9bc606375242.jpg" },
        { n: "خليل", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/dc84cefe-29ca-4a13-b6f7-9c798ef7bffd.jpg" },
        { n: "جنون كاتب", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/2112536d-526b-4b38-8100-00cf09f4e128.jpg" },
        { n: "دجن دعجة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/c3a260c7-9699-49e3-92c8-241989269be7.jpg" },
        { n: "نشوة الغفران", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/2c098ab0-5118-4f17-985f-40c2c71d10b4.jpg" },
    ];

    let score = 0, currentStep = 1, sec = 30, timer, playerName = "", selectedPiece = null, memoryFlipped = [], randomizedSteps = [];

    const easyPool = [
        { type: 'guess', t: 20, blur: 5, d: "خمن الكتاب (سهل) 📚" },
        { type: 'memory', t: 30, pairs: 2, d: "طابق البطاقات (سهل) 🃏" },
        { type: 'puzzle', t: 40, s: 2, d: "رتب الغلاف (2×2) 🧩" }
    ];
    const medPool = [
        { type: 'guess', t: 15, blur: 9, d: "خمن الكتاب (متوسط) ⚡" },
        { type: 'memory', t: 35, pairs: 3, d: "تحدي الذاكرة (متوسط) 🃏" },
        { type: 'puzzle', t: 50, s: 3, d: "رتب الغلاف (3×3) 🧩" }
    ];
    const hardPool = [
        { type: 'guess', t: 12, blur: 16, d: "خمن الكتاب (صعب) 🔥" },
        { type: 'memory', t: 45, pairs: 4, d: "الذاكرة الفولاذية (صعب) 🃏" },
        { type: 'puzzle', t: 70, s: 4, d: "المرحلة الكبرى (4×4) 🏆" }
    ];

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function initApp() {
        const d = new Date().toDateString();
        let t = JSON.parse(localStorage.getItem('adab_v18_limit') || '{"date":"","count":0}');
        if (t.date !== d) t = { date: d, count: 0 };
        localStorage.setItem('adab_v18_limit', JSON.stringify(t));
        document.getElementById('tries-text').innerText = `محاولاتك اليوم: ${3 - t.count}`;
    }

    function validateInput() {
        const v = document.getElementById('player-name').value.trim();
        const t = JSON.parse(localStorage.getItem('adab_v18_limit'));
        document.getElementById('btn-start').disabled = (v.length < 2 || t.count >= 3);
    }

    function startFestival() {
        let t = JSON.parse(localStorage.getItem('adab_v18_limit'));
        t.count++; localStorage.setItem('adab_v18_limit', JSON.stringify(t));
        randomizedSteps = [...shuffle([...easyPool]), ...shuffle([...medPool]), ...shuffle([...hardPool])];
        playerName = document.getElementById('player-name').value.trim();
        score = 0; currentStep = 1;
        document.getElementById('home').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        showCountdown(loadStep);
    }

    function showCountdown(cb) {
        const ov = document.getElementById('countdown-overlay');
        const txt = document.getElementById('countdown-text');
        ov.style.display = 'flex';
        let c = 3; txt.innerText = c;
        let ct = setInterval(() => {
            c--;
            if (c > 0) txt.innerText = c;
            else if (c === 0) txt.innerText = "انطلق!";
            else { clearInterval(ct); ov.style.display = 'none'; cb(); }
        }, 800);
    }

    function loadStep() {
        clearInterval(timer);
        selectedPiece = null; memoryFlipped = [];
        const s = randomizedSteps[currentStep-1];
        document.getElementById('lvl-num').innerText = currentStep;
        document.getElementById('lvl-desc').innerText = s.d;
        sec = s.t;
        const div = document.getElementById('game-content'); div.innerHTML = "";

        if (s.type === 'guess') renderGuess(s.blur);
        else if (s.type === 'memory') renderMemory(s.pairs);
        else if (s.type === 'puzzle') renderPuzzle(s.s);

        timer = setInterval(() => {
            sec--;
            document.getElementById('timer-line').style.width = (sec/s.t*100) + "%";
            if (sec <= 0) finish("للأسف، انتهى الوقت! ⏰", false);
        }, 1000);
    }

    function renderGuess(blur) {
        const correct = books[Math.floor(Math.random()*books.length)];
        let options = shuffle(books.filter(b => b.n !== correct.n)).slice(0, 3);
        options.push(correct);
        shuffle(options);
        document.getElementById('game-content').innerHTML = `
            <img src="${correct.i}" style="width:160px; filter:blur(${blur}px); border-radius:15px; margin-bottom:15px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                ${options.map(b => `<button class="start-btn" style="font-size:0.85rem;" onclick="checkGuess('${b.n}','${correct.n}')">${b.n}</button>`).join('')}
            </div>`;
    }

    function checkGuess(s, c) { if (s === c) { score += (sec * 5) + 50; nextStep(); } else finish("إجابة خاطئة! ❌", false); }

    function renderMemory(pairs) {
        const div = document.getElementById('game-content');
        let gameBooks = shuffle([...books]).slice(0, pairs);
        let cardsData = shuffle([...gameBooks, ...gameBooks]);
        const grid = document.createElement('div');
        grid.style = `display:grid; grid-template-columns:repeat(2, 1fr); gap:10px;`;
        cardsData.forEach(book => {
            const card = document.createElement('div');
            card.className = 'memory-card'; card.innerText = "?";
            card.onclick = () => {
                if (memoryFlipped.length < 2 && !card.dataset.done && !card.dataset.open) {
                    card.innerText = ""; card.style.backgroundImage = `url(${book.i})`;
                    card.dataset.name = book.n; card.dataset.open = "true"; memoryFlipped.push(card);
                    if (memoryFlipped.length === 2) {
                        if (memoryFlipped[0].dataset.name === memoryFlipped[1].dataset.name) {
                            memoryFlipped.forEach(c => { c.dataset.done = "true"; c.style.opacity = "0.5"; });
                            memoryFlipped = [];
                            if (document.querySelectorAll('[data-done="true"]').length === pairs * 2) { score += (sec * 5) + 100; nextStep(); }
                        } else {
                            setTimeout(() => { memoryFlipped.forEach(c => { c.innerText = "?"; c.style.backgroundImage = ""; delete c.dataset.open; }); memoryFlipped = []; }, 600);
                        }
                    }
                }
            };
            grid.appendChild(card);
        });
        div.appendChild(grid);
    }

    /* --- محرك الألغاز المحسن: التحقق من الهوية والمكان --- */
    function renderPuzzle(size) {
        const div = document.getElementById('game-content');
        const book = books[Math.floor(Math.random()*books.length)];
        const grid = document.createElement('div');
        grid.className = 'puzzle-grid';
        grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        
        const containerW = 280, containerH = 380;
        let totalPieces = size * size;
        let indices = Array.from({length: totalPieces}, (_, i) => i);
        let shuffled = shuffle([...indices]);

        shuffled.forEach((pieceId) => {
            const p = document.createElement('div');
            p.className = 'puzzle-piece';
            const w = containerW / size;
            const h = containerH / size;
            
            p.style.backgroundImage = `url(${book.i})`;
            p.style.backgroundSize = `${containerW}px ${containerH}px`;
            
            // تحديد أي جزء من الصورة ينتمي لهذه القطعة بناءً على معرفها الأصلي (pieceId)
            const bx = (pieceId % size) * w;
            const by = Math.floor(pieceId / size) * h;
            p.style.backgroundPosition = `-${bx}px -${by}px`;
            
            p.dataset.correctId = pieceId; // الهوية الرقمية للقطعة

            p.onclick = () => {
                if (!selectedPiece) {
                    selectedPiece = p;
                    p.classList.add('selected-piece');
                } else {
                    // تبديل الهوية والخلفية بين القطعتين المختاريتين
                    let targetID = p.dataset.correctId;
                    let targetBG = p.style.backgroundPosition;

                    p.dataset.correctId = selectedPiece.dataset.correctId;
                    p.style.backgroundPosition = selectedPiece.style.backgroundPosition;

                    selectedPiece.dataset.correctId = targetID;
                    selectedPiece.style.backgroundPosition = targetBG;

                    selectedPiece.classList.remove('selected-piece');
                    selectedPiece = null;

                    // فحص الفوز: هل رقم القطعة (ID) يطابق ترتيبها الحالي في الـ DOM؟
                    const allPieces = document.querySelectorAll('.puzzle-piece');
                    let win = true;
                    allPieces.forEach((piece, index) => {
                        if (parseInt(piece.dataset.correctId) !== index) win = false;
                    });

                    if (win) {
                        score += (sec * 10) + 200;
                        nextStep();
                    }
                }
            };
            grid.appendChild(p);
        });
        div.appendChild(grid);
    }

    function nextStep() {
        clearInterval(timer);
        document.getElementById('score-num').innerText = score;
        if (currentStep < 9) { currentStep++; loadStep(); }
        else finish("🎉 مبروك! لقد ختمت جميع المراحل بنجاح", true);
    }

    function finish(msg, wonAll) {
        clearInterval(timer);
        const today = new Date().toDateString();
        let d = JSON.parse(localStorage.getItem('adab_v18_lb') || '[]');
        d.push({ name: playerName, score: score, date: today });
        localStorage.setItem('adab_v18_lb', JSON.stringify(d));
        const daily = d.filter(e => e.date === today).sort((a,b) => b.score - a.score);
        const rank = daily.findIndex(e => e.name === playerName && e.score === score) + 1;
        
        let promo = wonAll ? (rank === 1 ? "ADAB30" : rank === 2 ? "ADAB25" : rank === 3 ? "ADAB15" : "ADAB10") : "ADAB5";
        let prizeMsg = wonAll ? "كود الفوز المكتسب:" : "كود الخصم التقديري:";

        document.getElementById('game-content').innerHTML = `
            <h2>${msg}</h2>
            <h1 style="font-size:3rem; color:var(--teal)">${score}⚡</h1>
            <p>ترتيبك اليوم: #${rank}</p>
            <div style="background:#fff9e6; border:2px dashed var(--gold); padding:15px; border-radius:15px; margin:15px 0;">
                <p style="font-size:0.9rem">${prizeMsg}</p>
                <h2 style="color:var(--burgundy); letter-spacing:2px; margin:5px 0;">${promo}</h2>
                <button class="start-btn" style="font-size:0.8rem; padding:8px;" onclick="navigator.clipboard.writeText('${promo}');alert('تم نسخ الكود')">نسخ الكود 📋</button>
            </div>
            <div style="background:#f9f9f9; border-radius:15px; padding:12px; margin:10px 0; max-height:180px; overflow-y:auto; text-align:right;">
                <h4 style="border-bottom:1px solid #ddd; padding-bottom:5px;">🏆 أفضل 10 اليوم:</h4>
                ${daily.slice(0, 10).map((u, i) => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee; font-size:0.8rem;"><span>${i+1}. ${u.name}</span><span>${u.score}⚡</span></div>`).join('')}
            </div>
            <button onclick="location.reload()" class="start-btn" style="background:#888;">العودة للرئيسية</button>
        `;
    }
</script>
</body>
</html>
