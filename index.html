<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهرجان ألعاب مركز الأدب العربي 🌙</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --teal: #1a9397; --burgundy: #a11f2a; --gold: #c6922a; --bg: #fdfcf9; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .main-card { background: white; padding: 1.5rem; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 90%; max-width: 420px; text-align: center; border-top: 10px solid var(--teal); position: relative; min-height: 580px; display: flex; flex-direction: column; }
        
        /* شريط الوقت */
        .timer-bar-container { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .timer-bar { height: 100%; background: var(--teal); width: 100%; transition: 1s linear; }

        .menu-btn { background: var(--teal); color: white; border: none; padding: 16px; border-radius: 15px; cursor: pointer; font-size: 1.1rem; font-weight: bold; width: 100%; margin-bottom: 15px; transition: 0.3s; }
        .menu-btn:hover { background: var(--burgundy); transform: scale(1.02); }

        #game-area { display: none; width: 100%; flex-grow: 1; }
        .stats { display: flex; justify-content: space-around; background: #f8f8f8; padding: 10px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; border: 1px solid #eee; }

        /* أساليب التشويش */
        .guess-img { width: 160px; height: 230px; border-radius: 15px; margin-bottom: 15px; border: 3px solid var(--teal); transition: 0.5s; object-fit: cover; }
        .blur-lvl1 { filter: blur(5px) grayscale(20%); }
        .blur-lvl2 { filter: blur(10px) grayscale(60%); }
        .blur-lvl3 { filter: blur(18px) grayscale(100%) contrast(130%); }

        /* الذاكرة */
        .grid { display: grid; gap: 8px; margin: auto; }
        .m-card { height: 85px; position: relative; transform-style: preserve-3d; transition: 0.5s; cursor: pointer; }
        .m-card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 2px solid #eee; }
        .back { background: var(--teal) url('https://www.transparenttextures.com'); }
        .front { background: white; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; }
        .front img { width: 90%; height: 90%; object-fit: contain; }

        /* البازل */
        .puzzle-grid { display: grid; gap: 2px; margin: 0 auto; border: 3px solid var(--teal); border-radius: 10px; overflow: hidden; }
        .puzzle-piece { background-size: 240px 320px; cursor: pointer; }
        .selected { filter: brightness(1.2); outline: 4px solid var(--gold); z-index: 5; }

        .opt-btn { background: white; border: 2px solid #ddd; padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 10px; width: 100%; font-weight: bold; font-family: inherit; transition: 0.2s; }
        .opt-btn:hover { border-color: var(--teal); background: #f0fafa; }

        .final-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; z-index: 100; }
    </style>
</head>
<body>

<div class="main-card" id="container">
    <div id="home">
        <img src="https://ibharbooks.com/cdn/shop/collections/markez-adab.png?v=1738877582&width=1024" style="width: 180px; margin-bottom: 15px;">
        <h1 style="color:var(--teal); font-size: 1.5rem; margin-bottom: 30px;">مهرجان ألعاب الأدب العربي 🌙</h1>
        <button class="menu-btn" onclick="startFlow('memory')">🃏 تحدي الذاكرة </button>
        <button class="menu-btn" onclick="startFlow('puzzle')">🧩 تركيب الأغلفة </button>
        <button class="menu-btn" onclick="startFlow('guess')">📚 خمن الكتاب </button>
    </div>

    <div id="game-area">
        <div onclick="location.reload()" style="cursor:pointer; color:#999; text-align:left; font-size:0.9rem; margin-bottom:10px;">✖ إنهاء</div>
        <div class="timer-bar-container"><div id="t-bar" class="timer-bar"></div></div>
        <div class="stats">
            <span>المستوى: <span id="lvl" style="color:var(--burgundy)">1</span> / 3</span>
            <span>⭐ <span id="pts">0</span></span>
        </div>
        <div id="content"></div>
        <div id="msg" style="margin-top:15px; font-weight:bold; color:var(--teal); min-height:24px;"></div>
    </div>
</div>

<script>
    const books = [
      
        { n: "متلازمة فريجولي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/5de7db3d-393a-4443-a7d9-38a313196d3d.jpg" },
        { n: "شجرة العهد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/dc433276-1d38-4214-9e39-041c675d42e1.jpg" },
        { n: "خوف", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/ffc54c3e-9843-4401-be4c-e69329593574.png" },
        { n: "بيتشيني", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/83aea5be-3950-4056-b793-be588d6d6fd8.jpg" },
        { n: "قصّاص", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/32a21b7b-f3c9-400a-bb27-9c104f13f32a.png" },
        { n: "الغيهب", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0ef78de9-8505-472e-867e-0889f360e5f9.jpg" },
        { n: "لأنها كيارا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0579a21c-9a8a-4110-a706-d11747f904cb.png" },
        { n: "قوت", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd25b623-314d-4d3c-9b40-04f32216e854.jpg" },
        { n: "عزير", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0691769a-513b-4e54-8d36-f68ac0f80a1a.png" },
        { n: "بيت الخناس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/679c4645-834e-42f9-a351-8cde94d5a123.png" },
        { n: "حسناء الدم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/c32925e4-2631-4e5f-8041-2097e8b1c36b.jpg" },
        { n: "طائفة الشعيبة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a178864f-98f0-4682-b36e-c21344d49f96.png" },
        { n: "جمنون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/8d3a83f9-7dd5-4939-88d2-31aaa09c4119.jpg" },
        { n: "لج", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/95e264c6-5f16-4d89-b6fa-11bd8866bcda.png" },
        { n: "فندق المقبرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/27ee3566-761c-40f1-b5eb-37df72dd242e.png" },
        { n: "هلاك مبهم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/795aee56-ca9c-45f5-a686-5ee25b243456.jpg" },
        { n: "خربوشة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/80fc325c-722c-47cb-9b4d-d5c7d6642b83.png" },
        { n: "إخلاد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/b8f4b8bc-40a4-477e-a6d0-395053b6e192.jpg" },
        { n: "سكاى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/6485a3a0-8234-4623-b9f8-21b80ccfb175.jpg" },
        { n: "زيروس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/7c8a684e-81a3-4875-9182-41328fd2c313.jpg" },
        { n: "اكاسيا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/625d085f-9b81-4e5f-ab85-b26c08a8bafb.png" },
        { n: "الممر الرابع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/62c01320-e152-4dfd-a780-07aa439264e4.jpg" },
        { n: "ذكريات ومخبوزات", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/16c54ecf-6295-47fd-bd62-ab2d13d61426.png" },
        { n: "بصمة مبهرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/da7534a6-eb04-49c4-841a-4f556322eaed.jpg" },
        { n: "فردوس بوعلي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/edc7725c-73f7-443f-a7b1-872502d3b4c3.jpg" },
        { n: "فندق السيد إنسان", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/97e24005-045e-4ea3-be60-531d1f165259.jpg" }, 
        { n: "الأعمدة والكجة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd3e1d97-4baa-4d29-93ac-a9dbb677cc48.jpg" },
        { n: "نحن موتى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a9bf694e-1c06-4b78-91f4-fc3565077f3e.jpg" },
        { n: "مذكرات محامية", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/18bdeeb2-e433-4ee3-a1a2-1e1cbcd7639d.jpg" },
        { n: "هجرة مزارع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/999e6b0b-cdb9-4f58-a992-a97a68bcddfe.jpg" },
        { n: "البارون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/fdf02b08-b4cb-4e4d-b594-804bad8cf800.jpg" }

    ];

    let score = 0, timer, sec, totalSec, currentLvl = 1, currentGame = '', selectedPiece = null;

    function startFlow(type) {
        currentGame = type; currentLvl = 1; score = 0;
        document.getElementById('home').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        loadLevel();
    }

    function loadLevel() {
        clearInterval(timer);
        document.getElementById('lvl').innerText = currentLvl;
        document.getElementById('pts').innerText = score;
        document.getElementById('msg').innerText = "";
        
        // إعدادات الوقت لكل لعبة ومستوى
        const config = {
            memory: { times: [40, 30, 25], pairs: [2, 6, 8], cols: [2, 4, 4] },
            puzzle: { times: [50, 40, 35], sizes: [2, 3, 4] },
            guess:  { times: [25, 20, 15], rounds: [2, 3, 4], opts: [2, 3, 4] }
        };

        totalSec = config[currentGame].times[currentLvl-1];
        sec = totalSec;
        updateBar();

        if (currentGame === 'memory') initMemory(config.memory.pairs[currentLvl-1], config.memory.cols[currentLvl-1]);
        else if (currentGame === 'puzzle') initPuzzle(config.puzzle.sizes[currentLvl-1]);
        else initGuess(config.guess.rounds[currentLvl-1], config.guess.opts[currentLvl-1]);

        timer = setInterval(() => {
            sec--;
            updateBar();
            if (sec <= 0) showFinal(false);
        }, 1000);
    }

    function updateBar() {
        const perc = (sec / totalSec) * 100;
        document.getElementById('t-bar').style.width = perc + "%";
    }

    function winLvl() {
        clearInterval(timer);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        if (currentLvl < 3) {
            currentLvl++;
            document.getElementById('msg').innerText = "رائع! استعد للمرحلة " + currentLvl;
            setTimeout(loadLevel, 1500);
        } else {
            showFinal(true);
        }
    }

    // --- 1. تحدي الذاكرة ---
    function initMemory(pairs, cols) {
        const div = document.getElementById('content');
        div.innerHTML = `<div class="grid" style="grid-template-columns: repeat(${cols}, 1fr)"></div>`;
        let sel = books.sort(() => 0.5 - Math.random()).slice(0, pairs);
        let cards = [...sel, ...sel].sort(() => 0.5 - Math.random());
        let flipped = [], matched = 0;
        cards.forEach(b => {
            const c = document.createElement('div'); c.className = 'm-card';
            c.innerHTML = `<div class="face back"></div><div class="face front"><img src="${b.i}"></div>`;
            c.onclick = () => {
                if (flipped.length < 2 && !c.classList.contains('flipped')) {
                    c.classList.add('flipped'); flipped.push({el: c, n: b.n});
                    if (flipped.length === 2) {
                        if (flipped[0].n === flipped[1].n) {
                            score += 50; matched += 2; flipped = [];
                            document.getElementById('pts').innerText = score;
                            if (matched === pairs * 2) winLvl();
                        } else {
                            setTimeout(() => { flipped.forEach(f => f.el.classList.remove('flipped')); flipped = []; }, 600);
                        }
                    }
                }
            };
            div.firstChild.appendChild(c);
        });
    }

    // --- 2. تركيب الأغلفة (البازل) ---
    function initPuzzle(size) {
        const book = books[Math.floor(Math.random()*books.length)];
        const div = document.getElementById('content');
        div.innerHTML = `<p style="font-size:0.8rem">رتب قطع الغلاف (${size}x${size})</p><div class="puzzle-grid" id="pg" style="grid-template-columns:repeat(${size},1fr); width:240px; height:320px;"></div>`;
        let pieces = Array.from({length: size*size}, (_, i) => i).sort(() => Math.random() - 0.5);
        pieces.forEach((p) => {
            const pc = document.createElement('div'); pc.className = 'puzzle-piece';
            pc.style.backgroundImage = `url(${book.i})`;
            pc.style.backgroundSize = `240px 320px`;
            pc.style.backgroundPosition = `${(p % size) * (100/(size-1))}% ${Math.floor(p / size) * (100/(size-1))}%`;
            pc.dataset.correctIdx = p;
            pc.onclick = () => {
                if(!selectedPiece) { selectedPiece = pc; pc.classList.add('selected'); }
                else {
                    let tPos = pc.style.backgroundPosition, tIdx = pc.dataset.correctIdx;
                    pc.style.backgroundPosition = selectedPiece.style.backgroundPosition;
                    pc.dataset.correctIdx = selectedPiece.dataset.correctIdx;
                    selectedPiece.style.backgroundPosition = tPos;
                    selectedPiece.dataset.correctIdx = tIdx;
                    selectedPiece.classList.remove('selected'); selectedPiece = null;
                    checkPuzzle(size);
                }
            };
            document.getElementById('pg').appendChild(pc);
        });
    }

    function checkPuzzle(size) {
        const ps = document.querySelectorAll('.puzzle-piece');
        let win = true;
        ps.forEach((p, i) => {
            let x = (i % size) * (100/(size-1)), y = Math.floor(i / size) * (100/(size-1));
            if(p.style.backgroundPosition !== `${x}% ${y}%`) win = false;
        });
        if(win) { score += 150; winLvl(); }
    }

    // --- 3. خمن الكتاب (التشويش) ---
    function initGuess(rounds, optCount) {
        let currentRound = 0;
        const render = () => {
            const correct = books[Math.floor(Math.random()*books.length)];
            const div = document.getElementById('content');
            const blurClass = `blur-lvl${currentLvl}`;
            div.innerHTML = `<img src="${correct.i}" class="guess-img ${blurClass}">`;
            let choices = [correct, ...books.filter(b=>b.n!==correct.n).sort(()=>0.5-Math.random()).slice(0, optCount-1)].sort(()=>0.5-Math.random());
            choices.forEach(ch => {
                const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = ch.n;
                b.onclick = () => {
                    if(ch.n === correct.n) {
                        score += 40; currentRound++;
                        if(currentRound >= rounds) winLvl(); else render();
                    } else {
                        b.style.borderColor = 'var(--burgundy)';
                        setTimeout(() => b.style.borderColor = '#ddd', 400);
                    }
                };
                div.appendChild(b);
            });
        };
        render();
    }
    function showFinal(win) {
        clearInterval(timer);
        
        // حفظ أعلى نتيجة في المتصفح
        const highScore = localStorage.getItem('litHighScore') || 0;
        if (score > highScore) {
            localStorage.setItem('litHighScore', score);
        }

        const final = document.createElement('div');
        final.className = 'final-screen';
        
        // تحديد النجوم بناءً على النتيجة
        let starCount = 0;
        if (score > 100) starCount = 1;
        if (score > 400) starCount = 2;
        if (score > 800) starCount = 3;
        
        const starsHtml = '<span style="color:var(--gold); font-size:2.5rem;">' + 
                          '⭐'.repeat(starCount) + '</span>' + 
                          '<span style="color:#ddd; font-size:2.5rem;">' + 
                          '⭐'.repeat(3 - starCount) + '</span>';

        const title = win ? "بطل مركز الأدب العربي! 🏆" : "انتهى الوقت! 🕒";
        const message = win ? "لقد أثبتّ أنك قارئ مثقف وذو ذاكرة حديدية!" : "لا بأس، العظمة تتطلب المحاولة مرة أخرى.";

        final.innerHTML = `
            <div style="background: white; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.5s ease;">
                <img src="https://ibharbooks.com/cdn/shop/collections/markez-adab.png?v=1738877582&width=1024" 
                     style="width: 140px; margin-bottom: 20px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));">
                
                <h2 style="color:var(--teal); margin-bottom: 5px; font-size: 1.6rem;">${title}</h2>
                <div class="stars-container" style="margin-bottom: 15px;">${starsHtml}</div>
                
                <div style="background: #fdfaf0; padding: 20px; border-radius: 20px; width: 80%; border: 1px dashed var(--gold); margin-bottom: 25px;">
                    <p style="color: #666; margin: 0 0 10px 0; font-size: 0.9rem;">${message}</p>
                    <div style="display: flex; justify-content: space-around; align-items: center;">
                        <div>
                            <span style="display: block; font-size: 0.7rem; color: #999; text-transform: uppercase;">نقاطك</span>
                            <span style="font-size: 1.8rem; font-weight: bold; color: var(--burgundy);">${score}</span>
                        </div>
                        <div style="width: 1px; height: 30px; background: #ddd;"></div>
                        <div>
                            <span style="display: block; font-size: 0.7rem; color: #999; text-transform: uppercase;">أفضل نتيجة</span>
                            <span style="font-size: 1.8rem; font-weight: bold; color: var(--teal);">${localStorage.getItem('litHighScore')}</span>
                        </div>
                    </div>
                </div>

                <button class="menu-btn" onclick="location.reload()" 
                        style="width: 80%; box-shadow: 0 10px 20px rgba(26, 147, 151, 0.3);">
                    العودة للرئيسية ↩️
                </button>
                
                <p style="margin-top: 20px; font-size: 0.8rem; color: #bbb;">شارك نتيجتك مع أصدقائك القراء</p>
            </div>
        `;

        document.getElementById('container').appendChild(final);
        
        // إطلاق القصاصات الملونة إذا كان فائزاً أو حقق نتيجة ممتازة
        if(win || score > 500) {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#1a9397', '#a11f2a', '#c6922a']
            });
        }
    }
