<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>مهرجان ألعاب مركز الأدب العربي ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --teal:#1a9397; --teal-dark:#127a7e; --burgundy:#a11f2a; --gold:#c6922a; }
        * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:'Tajawal',sans-serif; margin:0; padding:0; }
        body { background:linear-gradient(135deg,#e8f5f5 0%,#fdf6ec 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; touch-action:manipulation; }
        .main-card { background:white; padding:1.4rem; border-radius:32px; box-shadow:0 20px 60px rgba(26,147,151,0.18),0 4px 15px rgba(0,0,0,0.08); width:95%; max-width:410px; text-align:center; border-top:8px solid var(--teal); max-height:98vh; overflow-y:auto; position:relative; animation:cardIn 0.5s cubic-bezier(.175,.885,.32,1.275); }
        @keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        .logo { width:100%; max-width:170px; margin-bottom:8px; border-radius:14px; filter:drop-shadow(0 4px 12px rgba(26,147,151,0.2)); animation:logoPulse 3s ease-in-out infinite; }
        @keyframes logoPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
        .home-title { font-size:1.4rem; font-weight:900; color:var(--burgundy); margin-bottom:4px; letter-spacing:1px; }
        .home-subtitle { font-size:0.85rem; color:#888; margin-bottom:12px; }
        .tries-badge { display:inline-block; background:linear-gradient(135deg,var(--teal),var(--teal-dark)); color:white; padding:6px 18px; border-radius:50px; font-size:0.9rem; font-weight:bold; margin:8px 0 14px; box-shadow:0 3px 10px rgba(26,147,151,0.3); }
        .name-field { width:100%; padding:13px; border-radius:14px; border:2px solid #e0f0f0; text-align:center; margin:8px 0; font-size:1.05rem; font-weight:bold; outline:none; transition:0.3s; background:#f8fdfd; }
        .name-field:focus { border-color:var(--teal); background:white; box-shadow:0 0 0 4px rgba(26,147,151,0.1); }
        .start-btn { background:linear-gradient(135deg,var(--teal),var(--teal-dark)); color:white; border:none; padding:15px; border-radius:16px; cursor:pointer; font-weight:900; width:100%; font-size:1.15rem; box-shadow:0 6px 20px rgba(26,147,151,0.35); transition:0.2s; margin-top:6px; text-decoration:none; display:block; letter-spacing:1px; }
        .start-btn:disabled { opacity:0.3; background:#ccc; cursor:not-allowed; box-shadow:none; }
        .start-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(26,147,151,0.4); }
        .start-btn:not(:disabled):active { transform:scale(0.97); }
        #countdown-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.96); z-index:100; display:none; align-items:center; justify-content:center; border-radius:32px; pointer-events:none; flex-direction:column; gap:10px; }
        #countdown-text { font-size:6rem; font-weight:900; color:var(--teal); }
        @keyframes countPop { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
        .count-pop { animation:countPop 0.4s cubic-bezier(.175,.885,.32,1.275); }
        #countdown-label { font-size:1rem; color:#aaa; font-weight:bold; }
        .game-topbar { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
        .stat-pill { background:linear-gradient(135deg,#e8f8f8,#f0fdfd); border:1.5px solid #c5eaea; border-radius:50px; padding:6px 14px; font-size:0.85rem; color:var(--teal-dark); font-weight:bold; display:flex; align-items:center; gap:5px; flex:1; justify-content:center; }
        .stat-pill .val { font-size:1rem; font-weight:900; color:var(--teal); }
        .mute-btn { width:38px; height:38px; border-radius:50%; background:#f0fdfd; border:1.5px solid #c5eaea; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
        .progress-wrap { margin-bottom:6px; }
        .progress-steps { display:flex; gap:4px; margin-bottom:6px; }
        .step-dot { flex:1; height:5px; border-radius:10px; background:#e5e5e5; transition:0.4s; }
        .step-dot.done { background:var(--teal); }
        .step-dot.active { background:var(--gold); animation:dotPulse 1s ease-in-out infinite; }
        @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .timer-bar-wrap { background:#eee; height:7px; border-radius:10px; overflow:hidden; }
        #timer-line { height:100%; background:linear-gradient(90deg,var(--teal),var(--gold)); width:100%; transition:1s linear; border-radius:10px; }
        #timer-line.danger { background:linear-gradient(90deg,#e74c3c,#c0392b); }
        .lvl-desc { font-size:0.88rem; color:var(--teal-dark); font-weight:bold; margin-bottom:8px; background:#f0fdfd; border-radius:10px; padding:5px 10px; }
        .guess-img-wrap { position:relative; display:inline-block; margin:10px auto; border-radius:16px; overflow:hidden; box-shadow:0 8px 25px rgba(0,0,0,0.15); }
        .guess-img-wrap img { display:block; width:160px; border-radius:16px; transition:filter 0.5s; }
        .guess-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
        .guess-btn { background:white; border:2px solid #d5eeee; color:#333; padding:12px 8px; border-radius:14px; font-weight:bold; font-size:0.82rem; cursor:pointer; transition:0.2s; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
        .guess-btn:active { transform:scale(0.96); }
        .guess-btn.correct-ans { background:linear-gradient(135deg,#1a9397,#127a7e); color:white; border-color:var(--teal); }
        .guess-btn.wrong-ans { background:linear-gradient(135deg,#e74c3c,#c0392b); color:white; border-color:#e74c3c; }
        .memory-grid { display:grid; gap:8px; margin:8px 0; }
        .memory-card { perspective:800px; background:none !important; height:130px; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform 0.25s; box-shadow:0 3px 10px rgba(26,147,151,0.2); position:relative; overflow:hidden; }
        .memory-card:active { transform:scale(0.93); }
        .memory-card[data-done="true"] { opacity:0.45; pointer-events:none; }
        .memory-card[data-open="true"] { pointer-events:none; }
        .memory-card.matched { outline:3px solid var(--gold); outline-offset:2px; }
        .card-back { position:absolute; top:0; left:0; width:100%; height:100%; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; background:linear-gradient(135deg,var(--teal),var(--teal-dark)); transition:opacity 0.3s; }
        .card-front { position:absolute; top:0; left:0; width:100%; height:100%; border-radius:12px; overflow:hidden; opacity:0; transition:opacity 0.3s; }
        .card-front img { width:100%; height:100%; object-fit:cover; display:block; }
        .memory-card.flipped .card-back { opacity:0; pointer-events:none; }
        .memory-card.flipped .card-front { opacity:1; }
        .puzzle-grid { display:grid; gap:2px; margin:8px auto; border:3px solid var(--teal); border-radius:12px; overflow:hidden; width:280px; height:380px; box-shadow:0 8px 25px rgba(26,147,151,0.2); }
        .puzzle-piece { cursor:pointer; background-repeat:no-repeat; width:100%; height:100%; transition:0.15s; }
        .puzzle-piece:hover { filter:brightness(1.08); }
        .selected-piece { outline:4px solid var(--gold); outline-offset:-4px; z-index:10; transform:scale(0.96); }
        .score-popup { position:fixed; font-size:1.5rem; font-weight:900; color:var(--gold); pointer-events:none; z-index:9998; animation:scoreFloat 1.2s ease forwards; text-shadow:0 2px 8px rgba(0,0,0,0.2); }
        @keyframes scoreFloat { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(1.3)} }
        .result-screen { animation:fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(25px)} to{opacity:1;transform:translateY(0)} }
        .result-score { font-size:3.5rem; font-weight:900; background:linear-gradient(135deg,var(--teal),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:10px 0; }
        .rank-badge { display:inline-block; padding:6px 20px; border-radius:50px; font-size:1rem; font-weight:bold; margin:8px 0; }
        .rank-1 { background:linear-gradient(135deg,#f5d78e,#c6922a); color:#5a3b00; }
        .rank-2 { background:linear-gradient(135deg,#d5d5d5,#a0a0a0); color:#333; }
        .rank-3 { background:linear-gradient(135deg,#d4a57a,#a0622a); color:#fff; }
        .rank-other { background:#f0fdfd; color:var(--teal); border:2px solid #c5eaea; }
        .promo-box { background:linear-gradient(135deg,#fff9ec,#fff3d0); border:2px dashed var(--gold); padding:18px; border-radius:18px; margin:14px 0; }
        .promo-code { font-size:2.2rem; font-weight:900; letter-spacing:4px; color:var(--burgundy); margin:8px 0; }
        .copy-btn { background:var(--gold); color:white; border:none; padding:8px 20px; border-radius:50px; font-weight:bold; cursor:pointer; font-size:0.9rem; transition:0.2s; margin-top:6px; }
        .adabbook-section { margin:14px 0; border-radius:20px; overflow:hidden; box-shadow:0 8px 25px rgba(0,0,0,0.15); }
        .adabbook-header { background:linear-gradient(135deg,#1a9397 0%,#0d6b6e 50%,#a11f2a 100%); padding:16px; color:white; }
        .adabbook-logo-text { font-size:1.5rem; font-weight:900; letter-spacing:2px; margin-bottom:4px; }
        .adabbook-tagline { font-size:0.82rem; opacity:0.85; }
        .adabbook-body { background:white; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; border:1.5px solid #e0f0f0; border-top:none; border-radius:0 0 20px 20px; }
        .adabbook-features { text-align:right; flex:1; }
        .adabbook-feature { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:#555; margin-bottom:4px; font-weight:bold; }
        .shop-btn-new { display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,var(--burgundy),#7a1520); color:white; padding:12px 20px; border-radius:14px; text-decoration:none; font-weight:900; font-size:0.95rem; box-shadow:0 4px 15px rgba(161,31,42,0.35); transition:0.2s; white-space:nowrap; }
        .shop-btn-new:active { transform:scale(0.97); }
        .leaderboard { background:#f8fdfd; border-radius:16px; padding:12px; margin:12px 0; max-height:175px; overflow-y:auto; text-align:right; border:1.5px solid #e0f0f0; }
        .leaderboard-item { display:flex; justify-content:space-between; padding:5px 4px; border-bottom:1px solid #eef8f8; font-size:0.82rem; align-items:center; }
        .leaderboard-item:last-child { border-bottom:none; }
        .lb-rank { font-weight:900; color:var(--teal); margin-left:6px; }
        .lb-me { background:#f0fdfd; border-radius:8px; padding:2px 6px; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        @keyframes glow { 0%,100%{box-shadow:0 0 8px var(--gold)} 50%{box-shadow:0 0 35px var(--gold),0 0 70px rgba(198,146,42,0.4)} }
        .shake { animation:shake 0.4s ease-in-out; }
        .bounce { animation:bounce 0.4s ease; }
        .glow-anim { animation:glow 1.5s ease-in-out infinite; }
        #confetti-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; }
        .loading-wrap { padding:40px 20px; }
        .loading-spinner { width:50px; height:50px; border:4px solid #e0f0f0; border-top-color:var(--teal); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 15px; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .loading-bar-wrap { background:#e0f0f0; height:6px; border-radius:10px; overflow:hidden; margin-top:12px; }
        .loading-bar { height:100%; background:var(--teal); border-radius:10px; width:0%; transition:width 0.3s; }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-thumb { background:#c5eaea; border-radius:10px; }

        /* ===== خلفية جزيئات ===== */
        #particles-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .main-card { position:relative; z-index:1; }

        /* ===== تأثير فليب البطاقات ===== */
        .memory-card { perspective:800px; background:none !important; height:110px; }
        .card-inner { position:relative; width:100%; height:100%; transition:transform 0.35s ease-in-out; transform-style:preserve-3d; border-radius:12px; }
        .memory-card.flipped .card-inner { transform:rotateY(180deg); }
        .card-back {
            backface-visibility:hidden; -webkit-backface-visibility:hidden;
            background: #127a7e url('https://ibharbooks.com/cdn/shop/collections/markez-adab.png?v=1738877582&width=1024') center/65% no-repeat !important;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.15);
        }
        .card-back::after { content:''; }
        .card-back span { display:none; }
        .card-front { backface-visibility:hidden; -webkit-backface-visibility:hidden; transform:rotateY(180deg); opacity:1 !important; }

        /* ===== منصة المتصدرين ===== */
        .podium-wrap { display:flex; align-items:flex-end; justify-content:center; gap:8px; margin:16px 0; }
        .podium-item { display:flex; flex-direction:column; align-items:center; gap:4px; }
        .podium-avatar { font-size:1.8rem; }
        .podium-name { font-size:0.72rem; font-weight:900; color:#333; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center; }
        .podium-score { font-size:0.7rem; font-weight:bold; color:var(--teal); }
        .podium-bar { width:70px; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
        .podium-1 .podium-bar { height:90px; background:linear-gradient(to top,#f5d78e,#c6922a); }
        .podium-2 .podium-bar { height:65px; background:linear-gradient(to top,#d5d5d5,#a0a0a0); }
        .podium-3 .podium-bar { height:45px; background:linear-gradient(to top,#d4a57a,#a0622a); }

        /* ===== رسالة شخصية ===== */
        .personal-msg { background:linear-gradient(135deg,#f0fdfd,#fff9ec); border:1.5px solid #c5eaea; border-radius:14px; padding:10px 14px; margin:10px 0; font-size:0.88rem; font-weight:bold; color:var(--teal-dark); }

        /* ===== اهتزاز ===== */
        @keyframes vibrate { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-4px) rotate(-1deg)} 30%{transform:translateX(4px) rotate(1deg)} 45%{transform:translateX(-4px)} 60%{transform:translateX(4px)} 75%{transform:translateX(-2px)} 90%{transform:translateX(2px)} }
        .vibrate { animation:vibrate 0.4s ease; }
        .motivation-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:rgba(255,255,255,0.97); z-index:200;
            display:none; align-items:center; justify-content:center;
            border-radius:32px; flex-direction:column; gap:12px;
            animation:fadeInUp 0.4s ease;
        }
        .motivation-emoji { font-size:4rem; animation:bounce 0.6s ease infinite; }
        .motivation-title { font-size:1.5rem; font-weight:900; color:var(--teal); }
        .motivation-sub { font-size:0.95rem; color:#888; font-weight:bold; text-align:center; padding:0 20px; }
        .motivation-btn {
            background:linear-gradient(135deg,var(--teal),var(--teal-dark));
            color:white; border:none; padding:14px 35px;
            border-radius:50px; font-weight:900; font-size:1.1rem;
            cursor:pointer; box-shadow:0 6px 20px rgba(26,147,151,0.35);
            margin-top:8px;
        }

        /* ===== أزرار المشاركة ===== */
        .share-section {
            margin:14px 0;
            background:#f8fdfd;
            border:1.5px solid #e0f0f0;
            border-radius:16px;
            padding:14px;
        }
        .share-title { font-size:0.88rem; color:#888; font-weight:bold; margin-bottom:10px; }
        .share-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
        .share-btn {
            display:inline-flex; align-items:center; gap:5px;
            padding:9px 16px; border-radius:50px;
            font-weight:bold; font-size:0.82rem;
            border:none; cursor:pointer; transition:0.2s;
            color:white;
        }
        .share-btn:active { transform:scale(0.95); }
        .share-wa { background:#25D366; }
        .share-tw { background:#000; }
        .share-copy { background:var(--teal); }
    </style>
</head>
<body>

<div class="main-card">
    <div id="countdown-overlay">
        <div id="countdown-text">3</div>
        <div id="countdown-label">استعد!</div>
    </div>

    <!-- رسالة تحفيزية -->
    <div id="motivation-overlay" class="motivation-overlay">
        <div class="motivation-emoji" id="motiv-emoji">🔥</div>
        <div class="motivation-title" id="motiv-title">رائع!</div>
        <div class="motivation-sub" id="motiv-sub">أكملت 3 مراحل بنجاح!</div>
        <button class="motivation-btn" onclick="closeMotivation()">واصل التحدي ⚡</button>
    </div>

    <div id="home">
        <img src="https://ibharbooks.com/cdn/shop/collections/markez-adab.png?v=1738877582&width=1024" class="logo" alt="مركز الأدب العربي">
        <div class="home-title">لعبة العيد 🎁</div>
        <div class="home-subtitle">9 مراحل • 3 ألعاب • جوائز</div>
        <div class="tries-badge" id="tries-text">المحاولات المتبقية: ...</div>
        <input type="text" id="player-name" class="name-field" placeholder="اكتب اسمك للبدء..." maxlength="12" oninput="validateInput()" onkeypress="if(event.key==='Enter') startFestival()">
        <button class="start-btn" id="btn-start" onclick="startFestival()" disabled>ابدأ التحدي 🚀</button>
    </div>

    <div id="game-area" style="display:none;">
        <div class="game-topbar">
            <div class="stat-pill">⭐ <span class="val" id="score-num">0</span></div>
            <div class="stat-pill">🎯 <span class="val" id="lvl-num">1</span>/9</div>
            <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
        </div>
        <div class="progress-wrap">
            <div class="progress-steps" id="progress-steps"></div>
            <div class="timer-bar-wrap"><div id="timer-line"></div></div>
        </div>
        <div class="lvl-desc" id="lvl-desc"></div>
        <div id="game-content"></div>
    </div>
</div>
<canvas id="particles-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<script src="https://unpkg.com/firebase@8.10.1/firebase-app.js"></script>
<script src="https://unpkg.com/firebase@8.10.1/firebase-database.js"></script>
<script>
const books = [

function initAudio(){try{audioContext=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function unlockAudio(){
    if(soundsUnlocked)return;
    if(!audioContext)initAudio();
    if(audioContext&&audioContext.state==='suspended'){audioContext.resume().then(function(){soundsUnlocked=true;});}
    else soundsUnlocked=true;
}
function _play(freq,type,dur,vol,delay){
    vol=vol||0.15; delay=delay||0;
    if(!audioContext||isMuted||!soundsUnlocked)return;
    try{
        var now=audioContext.currentTime+delay;
        var o=audioContext.createOscillator(),g=audioContext.createGain();
        o.type=type; o.frequency.value=freq;
        g.gain.setValueAtTime(vol,now); g.gain.exponentialRampToValueAtTime(0.01,now+dur);
        o.connect(g); g.connect(audioContext.destination);
        o.start(now); o.stop(now+dur);
    }catch(e){}
}
function playSound(t){
    if(!audioContext) initAudio();
    if(audioContext && audioContext.state==='suspended'){
        audioContext.resume().then(function(){
            soundsUnlocked=true;
            _playNow(t);
        });
    } else {
        soundsUnlocked=true;
        _playNow(t);
    }
}
function _playNow(t){
    if(isMuted) return;
    if(t==='correct'){_play(523,'sine',0.15);_play(659,'sine',0.2,0.15,0.1);}
    else if(t==='wrong'){_play(220,'sawtooth',0.3,0.12);}
    else if(t==='win'){[523,659,784,1046].forEach(function(f,i){_play(f,'triangle',0.3,0.12,i*0.13);});}
    else if(t==='timer'){for(var i=0;i<3;i++)_play(880,'square',0.08,0.08,i*0.18);}
    else if(t==='click'){_play(600,'sine',0.05,0.05);}
    else if(t==='combo'){[659,784,1046].forEach(function(f,i){_play(f,'triangle',0.15,0.12,i*0.1);});}
}
function toggleMute(){isMuted=!isMuted;document.getElementById('mute-btn').innerText=isMuted?'🔇':'🔊';}
document.addEventListener('click',unlockAudio,{once:true});
document.addEventListener('touchstart',unlockAudio,{once:true});

function startCelebration(){
    var canvas=document.getElementById('confetti-canvas');
    var ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    var pieces=[], colors=['#1a9397','#a11f2a','#c6922a','#f5d78e','#ffffff'];
    for(var i=0;i<200;i++) pieces.push({
        x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height,
        w:Math.random()*12+4, h:Math.random()*12+4,
        color:colors[Math.floor(Math.random()*colors.length)],
        speed:Math.random()*4+2, angle:Math.random()*360, spin:Math.random()*6-3,
        shape:Math.random()>0.5?'rect':'circle'
    });
    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pieces.forEach(function(p){
            p.y+=p.speed; p.angle+=p.spin;
            if(p.y>canvas.height)p.y=-20;
            ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle*Math.PI/180); ctx.fillStyle=p.color;
            if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
            else ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
            ctx.restore();
        });
        animationFrame=requestAnimationFrame(animate);
    }
    animate();
    setTimeout(function(){cancelAnimationFrame(animationFrame);ctx.clearRect(0,0,canvas.width,canvas.height);},8000);
}

function showScorePopup(pts,isCombo){

    el.style.left=(window.innerWidth/2-60)+'px';
    el.style.top=(window.innerHeight/2-80)+'px';
    document.body.appendChild(el);
    setTimeout(function(){el.remove();},1300);
}

function shuffle(arr){
    var a=[...arr];
    for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
    return a;
}

function filterBrokenImages(){
    return new Promise(function(resolve){
        var done=0, working=[];
        books.forEach(function(book){
            var img=new Image();
            function check(){done++;if(done===books.length){validBooks=working.length>=4?working:[...books];resolve();}}
            img.onload=function(){working.push(book);check();};
            img.onerror=check;
            img.src=book.i;
        });
    });
}

function initApp(){

    if(t.date!==d)t={date:d,count:0};

}

function updateTriesDisplay(){

    var el=document.getElementById('tries-text');
    if(el) el.innerText='المحاولات المتبقية اليوم: '+(3-t.count);
}

function validateInput(){
    var v=document.getElementById('player-name').value.trim();
    var t=JSON.parse(localStorage.getItem('adab_v20_limit')||'{"date":"","count":0}');
    document.getElementById('btn-start').disabled=!(v.length>=2&&t.count<3);
}

function startFestival(){
    var t=JSON.parse(localStorage.getItem('adab_v20_limit')||'{"date":"","count":0}');
    var today=new Date().toDateString();
    if(t.date!==today){t.date=today;t.count=0;}
    if(t.count>=3){alert("استنفذت محاولاتك اليوم! تعال غداً 🎮");return;}
    playerName=document.getElementById('player-name').value.trim();
    if(playerName.length<2){alert("أدخل اسمًا صحيحًا");return;}
    t.count++; localStorage.setItem('adab_v20_limit',JSON.stringify(t));
    updateTriesDisplay();
    document.getElementById('home').style.display='none';
    document.getElementById('game-area').style.display='block';
    document.getElementById('score-num').innerText='0';
    document.getElementById('game-content').innerHTML='<div class="loading-wrap"><div class="loading-spinner"></div><p style="color:var(--teal);font-weight:bold;">جاري تحميل الصور...</p><div class="loading-bar-wrap"><div class="loading-bar" id="load-bar"></div></div></div>';
    var prog=0;
    var li=setInterval(function(){
        prog=Math.min(prog+Math.random()*15,90);
        var b=document.getElementById('load-bar');
        if(b)b.style.width=prog+'%';
    },200);
    filterBrokenImages().then(function(){
        clearInterval(li);
        var b=document.getElementById('load-bar');
        if(b)b.style.width='100%';
        setTimeout(function(){
            randomizedSteps=[...shuffle(easyPool),...shuffle(medPool),...shuffle(hardPool)];
            score=0; currentStep=1; gameActive=true; combo=0;
            buildProgressDots();
            showCountdown(loadStep);
        },300);
    });
}

function buildProgressDots(){
    var wrap=document.getElementById('progress-steps');
    wrap.innerHTML='';
    for(var i=1;i<=9;i++){
        var d=document.createElement('div');
        d.className='step-dot'+(i===1?' active':'');
        d.id='dot-'+i;
        wrap.appendChild(d);
    }
}

function updateProgressDots(){
    for(var i=1;i<=9;i++){
        var d=document.getElementById('dot-'+i);
        if(!d)continue;
        d.className='step-dot'+(i<currentStep?' done':i===currentStep?' active':'');
    }
}

function showCountdown(cb){
    var ov=document.getElementById('countdown-overlay');
    var txt=document.getElementById('countdown-text');
    var lbl=document.getElementById('countdown-label');
    ov.style.display='flex';
    var c=3; txt.innerText=c; lbl.innerText='استعد!';
    _play(440,'sine',0.15,0.2); // صوت البداية
    var ct=setInterval(function(){
        c--;
        txt.className='count-pop';
        setTimeout(function(){txt.className='';},400);
        if(c>0){
            txt.innerText=c;
            _play(440,'sine',0.15,0.2); // تكتك
        }
        else if(c===0){
            txt.innerText='🚀';
            lbl.innerText='انطلق!';
            _play(523,'triangle',0.3,0.25); // صوت الانطلاق
            _play(659,'triangle',0.3,0.2,0.1);
            _play(784,'triangle',0.3,0.2,0.2);
        }
        else{clearInterval(ct);ov.style.display='none';cb();}
    },750);
}

function loadStep(){
    if(!gameActive)return;
    clearInterval(timer); selectedPiece=null;
    // إعادة إظهار العناصر
    var topbar=document.querySelector('.game-topbar');
    var progress=document.querySelector('.progress-wrap');
    var lvlDesc=document.getElementById('lvl-desc');
    if(topbar) topbar.style.display='flex';
    if(progress) progress.style.display='block';
    if(lvlDesc) lvlDesc.style.display='block';
    updateProgressDots();
    var s=randomizedSteps[currentStep-1];
    document.getElementById('lvl-num').innerText=currentStep;
    document.getElementById('lvl-desc').innerText=s.d;
    sec=s.t;
    var tl=document.getElementById('timer-line');
    tl.style.width='100%'; tl.classList.remove('danger');
    document.getElementById('game-content').innerHTML='';
    if(s.type==='guess')renderGuess(s.blur);
    else if(s.type==='memory')renderMemory(s.pairs);
    else if(s.type==='puzzle')renderPuzzle(s.s);
    timer=setInterval(function(){
        sec--;
        var pct=sec/s.t*100;
        tl.style.width=pct+'%';
        if(pct<30)tl.classList.add('danger');
        if(sec===5)playSound('timer');
        if(sec<=0){clearInterval(timer);gameActive=false;finish("للأسف، انتهى الوقت! ⏰",false);}
    },1000);
}

// ===== التخمين =====
function renderGuess(blur){
    var correct=validBooks[Math.floor(Math.random()*validBooks.length)];
    var options=shuffle(validBooks.filter(function(b){return b.n!==correct.n;})).slice(0,3);
    options.push(correct); options=shuffle(options);
    var div=document.getElementById('game-content');
    var wrap=document.createElement('div');
    wrap.innerHTML='<div class="guess-img-wrap"><img src="'+correct.i+'" style="filter:blur('+blur+'px);" id="guess-img" width="160"></div><div class="guess-grid" id="guess-btns"></div>';
    div.appendChild(wrap);
    var grid=document.getElementById('guess-btns');
    options.forEach(function(b){
        var btn=document.createElement('button');
        btn.className='guess-btn'; btn.innerText=b.n;
        btn.onclick=function(){checkGuess(b.n,correct.n,btn,grid);};
        grid.appendChild(btn);
    });
}

function checkGuess(selected,correct,btn,grid){
    if(!gameActive)return;
    Array.from(grid.children).forEach(function(b){
        b.disabled=true;
        if(b.innerText===correct)b.classList.add('correct-ans');
    });
    var img=document.getElementById('guess-img');
    if(img)img.style.filter='blur(0)';
    if(selected===correct){
        combo++;
        var pts=(sec*5)+50+(combo>1?combo*20:0);
        score+=pts; document.getElementById('score-num').innerText=score;
        showScorePopup(pts,combo>1);
        playSound(combo>1?'combo':'correct');
        btn.classList.add('bounce');
        setTimeout(function(){
            if(currentStep===9){gameActive=false;clearInterval(timer);playSound('win');finish("🎉 مبروك! أكملت جميع المراحل!",true);}
            else nextStep();
        },900);
    } else {
        combo=0; clearInterval(timer); gameActive=false;
        btn.classList.add('wrong-ans','shake');
        vibrateDevice();
        playSound('wrong');
        setTimeout(function(){finish("إجابة خاطئة ❌",false);},1000);
    }
}

// ===== الذاكرة =====
function renderMemory(pairs){
    var div=document.getElementById('game-content');
    var sel=shuffle(validBooks).slice(0,pairs);
    var cards=[];
    sel.forEach(function(b){cards.push({n:b.n,i:b.i,id:b.n});cards.push({n:b.n,i:b.i,id:b.n});});
    cards=shuffle(cards);
    var cols=pairs<=2?2:pairs<=3?3:4;
    // بطاقتين في الصف لتكون بالطول
    if(pairs===4) cols=4;
    else cols=2;
    var grid=document.createElement('div');
    grid.className='memory-grid';
    grid.style.gridTemplateColumns='repeat('+cols+', 1fr)';
    var flipped=[],matchedCount=0,isChecking=false;
    cards.forEach(function(card){
        var el=document.createElement('div');
        el.className='memory-card';
        var inner=document.createElement('div');
        inner.className='card-inner';
        var back=document.createElement('div');
        back.className='card-back';
        var front=document.createElement('div');
        front.className='card-front';
        var img=document.createElement('img');
        img.src=card.i; img.alt=card.n;
        img.onerror=function(){
            front.style.background='linear-gradient(135deg,var(--teal-dark),#0a5a5e)';
            img.style.display='none';
            var t=document.createElement('div');
            t.style.cssText='color:white;font-size:0.7rem;font-weight:bold;padding:6px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;';
            t.innerText=card.n; front.appendChild(t);
        };
        front.appendChild(img);
        inner.appendChild(back); inner.appendChild(front);
        el.appendChild(inner);
        el.onclick=function(){
            if(!gameActive||isChecking||el.dataset.done==='true'||el.dataset.open==='true')return;
            el.dataset.open='true'; el.classList.add('flipped');
            playSound('click'); flipped.push({el:el,card:card});
            if(flipped.length===2){
                isChecking=true;
                var a=flipped[0],b=flipped[1];
                if(a.card.id===b.card.id){
                    // تطابق - صوت فوري
                    playSound('correct');
                    a.el.dataset.done='true'; b.el.dataset.done='true';
                    a.el.classList.add('matched'); b.el.classList.add('matched');
                    flipped=[]; isChecking=false; matchedCount++;
                    if(matchedCount===pairs){
                        combo++;
                        var pts=(sec*8)+100+(combo>1?combo*20:0);
                        score+=pts; document.getElementById('score-num').innerText=score;
                        showScorePopup(pts,combo>1);
                        playSound(combo>1?'combo':'win');
                        setTimeout(function(){
                            if(currentStep===9){gameActive=false;finish("🎉 مبروك! أكملت جميع المراحل!",true);}
                            else nextStep();
                        },600);
                    }
                } else {
                    unlockAudio();
                    setTimeout(function(){
                        playSound('wrong'); combo=0;
                        setTimeout(function(){
                            [a,b].forEach(function(x){
                                x.el.dataset.open='false';
                                x.el.classList.remove('flipped');
                            });
                            flipped=[]; isChecking=false;
                        },700);
                    },350);
                }
            }
        };
        grid.appendChild(el);
    });
    div.appendChild(grid);
}

// ===== البازل =====
function renderPuzzle(size){
    var div=document.getElementById('game-content');
    var book=validBooks[Math.floor(Math.random()*validBooks.length)];
    var grid=document.createElement('div');
    grid.className='puzzle-grid';
    grid.style.gridTemplateColumns='repeat('+size+', 1fr)';
    grid.style.direction='ltr';
    var W=280,H=380;
    var total=size*size;
    var arr=[];
    for(var k=0;k<total;k++) arr.push(k);

    // تأكد إن الترتيب مش مرتب أصلاً
    var shuffled;
    do { shuffled=shuffle(arr); } while(isInOrder(shuffled));

    shuffled.forEach(function(originalIndex, slotIndex){
        var p=document.createElement('div');
        p.className='puzzle-piece';
        var w=W/size, h=H/size;
        var col=originalIndex%size;
        var row=Math.floor(originalIndex/size);
        p.style.backgroundImage='url('+book.i+')';
        p.style.backgroundSize=W+'px '+H+'px';
        p.style.backgroundPosition='-'+col*w+'px -'+row*h+'px';
        // correctIndex = الصورة الصحيحة لهذه الخانة = originalIndex
        p.dataset.correctIndex=originalIndex;
        grid.appendChild(p);
    });

    div.appendChild(grid);

    var pieces=grid.querySelectorAll('.puzzle-piece');
    pieces.forEach(function(p, slotIndex){
        p.onclick=function(){
            if(!gameActive)return;
            playSound('click');
            if(!selectedPiece){
                selectedPiece=p;
                p.classList.add('selected-piece');
            } else if(selectedPiece===p){
                selectedPiece.classList.remove('selected-piece');
                selectedPiece=null;
            } else {
                var p1=selectedPiece, p2=p;

                // تبادل الخلفيتين
                var tmpBg=p1.style.backgroundPosition;
                p1.style.backgroundPosition=p2.style.backgroundPosition;
                p2.style.backgroundPosition=tmpBg;

                // تبادل الـ correctIndex
                var tmpIdx=p1.dataset.correctIndex;
                p1.dataset.correctIndex=p2.dataset.correctIndex;
                p2.dataset.correctIndex=tmpIdx;

                p1.classList.remove('selected-piece');
                selectedPiece=null;

                // تحقق من الفوز
                var allPieces=grid.querySelectorAll('.puzzle-piece');
                var won=true;
                allPieces.forEach(function(pc, i){
                    if(parseInt(pc.dataset.correctIndex)!==i) won=false;
                });

                if(won){
                    combo++;
                    var pts=(sec*10)+200+(combo>1?combo*30:0);
                    score+=pts;
                    document.getElementById('score-num').innerText=score;
                    showScorePopup(pts,combo>1);
                    playSound('win');
                    setTimeout(function(){
                        if(currentStep===9){gameActive=false;finish("🎉 مبروك! أكملت جميع المراحل!",true);}
                        else nextStep();
                    },600);
                }
            }
        };
    });
}

function isInOrder(arr){
    for(var i=0;i<arr.length;i++) if(arr[i]!==i) return false;
    return true;
}

// ===== الانتقال للمرحلة التالية مع رسائل تحفيزية =====
function nextStep(){
    clearInterval(timer);
    if(currentStep<9){
        currentStep++;
        // تحقق هل في رسالة تحفيزية لهذه المرحلة
        var msg = null;
        for(var i=0;i<motivationMessages.length;i++){
            if(motivationMessages[i].step === currentStep-1){ // بعد إكمال المرحلة
                msg = motivationMessages[i];
                break;
            }
        }
        if(msg){
            showMotivation(msg, loadStep);
        } else {
            loadStep();
        }
    }
}

// ===== النتيجة مع Firebase =====
function finish(msg,wonAll){
    clearInterval(timer);
    // إخفاء شريط المعلومات وعنوان المرحلة
    document.getElementById('lvl-desc').style.display='none';
    document.querySelector('.game-topbar').style.display='none';
    document.querySelector('.progress-wrap').style.display='none';
    if(!db){
        showResult(msg,wonAll,[],1);
        return;
    }
    document.getElementById('game-content').innerHTML='<div class="loading-wrap"><div class="loading-spinner"></div><p style="color:var(--teal);font-weight:bold;margin-top:10px;">جاري حفظ نتيجتك...</p></div>';
    var todayKey=getTodayKey();
    var safeName=playerName.replace(/[.#$\[\]/]/g,'_');
    var playerRef=db.ref('leaderboard/'+todayKey+'/'+safeName);
    var fallback=setTimeout(function(){showResult(msg,wonAll,[],1);},5000);
    playerRef.once('value').then(function(snap){
        var existing=snap.val();
        if(!existing||score>existing.score){
            return playerRef.set({name:playerName,score:score,time:Date.now()});
        }
    }).then(function(){
        return db.ref('leaderboard/'+todayKey).orderByChild('score').limitToLast(5).once('value');
    }).then(function(snap){
        clearTimeout(fallback);
        var daily=[];
        snap.forEach(function(child){daily.unshift(child.val());});
        var rank=1;
        for(var i=0;i<daily.length;i++){if(daily[i].name===playerName){rank=i+1;break;}}
        showResult(msg,wonAll,daily,rank);
    }).catch(function(){
        clearTimeout(fallback);
        showResult(msg,wonAll,[],1);
    });
}

function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

function roundRectTop(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h);
    ctx.lineTo(x,y+h);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

// ===== خلفية جزيئات =====
function initParticles(){
    var canvas=document.getElementById('particles-canvas');
    if(!canvas)return;
    var ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    var pts=[];
    for(var i=0;i<35;i++) pts.push({
        x:Math.random()*canvas.width, y:Math.random()*canvas.height,
        r:Math.random()*3+1, vx:(Math.random()-0.5)*0.4, vy:(Math.random()-0.5)*0.4,
        a:Math.random(), va:Math.random()*0.008+0.003,
        c:['rgba(26,147,151,','rgba(198,146,42,','rgba(161,31,42,'][Math.floor(Math.random()*3)]
    });
    function draw(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pts.forEach(function(p){
            p.x+=p.vx; p.y+=p.vy; p.a+=p.va;
            if(p.x<0||p.x>canvas.width) p.vx*=-1;
            if(p.y<0||p.y>canvas.height) p.vy*=-1;
            var alpha=Math.abs(Math.sin(p.a))*0.25;
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=p.c+alpha+')';
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
}

        html+='<div class="podium-name" style="'+(isMe?'color:var(--teal)':'')+'">'+u.name+'</div>';
        html+='<div class="podium-score">'+u.score+'⚡</div>';
        html+='<div class="podium-bar" style="font-size:0.9rem;font-weight:900;">'+(idx+1)+'</div>';
        html+='</div>';
    });
    html+='</div>';
    // المراكز 4-5
    if(daily.length>3){
        html+='<div style="border-top:2px solid #e0f0f0;padding-top:8px;margin-top:4px;">';
        var limit=Math.min(daily.length,5);
        for(var i=3;i<limit;i++){
            var u=daily[i];
            var isMe=u.name===myName;
            html+='<div class="leaderboard-item '+(isMe?'lb-me':'')+'">';
            html+='<span><span class="lb-rank">'+(i+1)+'.</span> '+u.name+' '+(isMe?'⭐':'')+'</span>';
            html+='<span style="font-weight:bold;color:var(--teal)">'+u.score+'⚡</span>';
            html+='</div>';
        }
        html+='</div>';
    }
    return html;
}

// ===== العب مرة ثانية =====
function playAgain(){
    var t=JSON.parse(localStorage.getItem('adab_v20_limit')||'{"date":"","count":0}');
    var today=new Date().toDateString();
    if(t.date!==today){t.date=today;t.count=0;}
    if(t.count>=3){ alert("استنفذت محاولاتك اليوم! تعال غداً 🎮"); return; }
    t.count++; localStorage.setItem('adab_v20_limit',JSON.stringify(t));
    updateTriesDisplay();
    document.getElementById('game-area').style.display='block';
    document.getElementById('home').style.display='none';
    document.getElementById('score-num').innerText='0';
    document.getElementById('game-content').innerHTML='<div class="loading-wrap"><div class="loading-spinner"></div><p style="color:var(--teal);font-weight:bold;">جاري تحميل الصور...</p><div class="loading-bar-wrap"><div class="loading-bar" id="load-bar"></div></div></div>';
    var prog=0;
    var li=setInterval(function(){
        prog=Math.min(prog+Math.random()*15,90);
        var b=document.getElementById('load-bar');
        if(b)b.style.width=prog+'%';
    },200);
    filterBrokenImages().then(function(){
        clearInterval(li);
        var b=document.getElementById('load-bar');
        if(b)b.style.width='100%';
        setTimeout(function(){
            randomizedSteps=[...shuffle(easyPool),...shuffle(medPool),...shuffle(hardPool)];
            score=0; currentStep=1; gameActive=true; combo=0;
            buildProgressDots();
            showCountdown(loadStep);
        },300);
    });
}

initApp();
initFirebase();
initParticles();
