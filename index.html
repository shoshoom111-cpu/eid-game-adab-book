<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مهرجان ألعاب مركز الأدب العربي ⚡</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --teal: #1a9397; --burgundy: #a11f2a; --gold: #c6922a; --bg: #fdfcf9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: manipulation; }
        .main-card { background: white; padding: 1.2rem; border-radius: 30px; box-shadow: 0 15px 45px rgba(0,0,0,0.12); width: 95%; max-width: 400px; text-align: center; border-top: 10px solid var(--teal); max-height: 98vh; overflow-y: auto; }
        .logo { width: 100%; max-width: 180px; margin-bottom: 10px; border-radius: 10px; }
        .name-field { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; text-align: center; margin: 10px 0; font-size: 1.1rem; font-weight: bold; outline: none; }
        .start-btn { background: var(--teal); color: white; border: none; padding: 14px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(26, 147, 151, 0.3); transition: 0.2s; margin-top: 5px; text-decoration: none; display: block; }
        .start-btn:disabled { opacity: 0.3; background: #ccc; cursor: not-allowed; }
        .stats-header { display: flex; justify-content: space-around; padding: 8px; background: #f0fafa; border-radius: 12px; margin-bottom: 8px; font-size: 0.9rem; color: var(--teal); font-weight: bold; }
        #score-num { color: #e67e22; font-size: 1.1rem; font-weight: bold; }
        .timer-container { background: #eee; height: 8px; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        #timer-line { height: 100%; background: var(--teal); width: 100%; transition: 1s linear; }
        .puzzle-grid { display: grid; gap: 2px; margin: 10px auto; background: #ddd; border: 3px solid var(--teal); border-radius: 10px; overflow: hidden; touch-action: none; }
        .puzzle-piece { cursor: pointer; background-repeat: no-repeat; transition: transform 0.1s; border: 0.5px solid rgba(255,255,255,0.3); }
        .selected-piece { outline: 4px solid var(--gold); z-index: 10; transform: scale(1.05); }
        .leaderboard-box { margin: 15px 0; padding: 10px; background: #fffdf5; border-radius: 15px; font-size: 0.85rem; border: 1px solid #f9ebbe; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #eee; align-items: center; }
        .coupon-badge { background: var(--gold); color: white; padding: 2px 6px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .copy-btn { background: #eee; color: #333; padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; border: 1px solid #ddd; cursor: pointer; display: inline-block; margin-top: 5px; }
        .share-btn { background: #25D366; color: white; }
        .shop-btn { background: var(--burgundy); color: white; margin-top: 10px; }
    </style>
</head>
<body onload="initApp()">

<div class="main-card">
    <div id="home">
        <img src="https://ibharbooks.com/cdn/shop/collections/markez-adab.png?v=1738877582&width=1024" class="logo">
        <h3 style="color: var(--burgundy);">مهرجان ألعاب الأدب ⚡</h3>
        <p id="tries-text" style="font-size: 0.8rem; color: var(--teal); margin: 5px 0; font-weight: bold;"></p>
        
        <div class="leaderboard-box">
            <h4 style="color: var(--burgundy); margin-bottom: 5px;">🏆 جوائز المتصدرين اليوم (TOP 5)</h4>
            <div id="top-5-list" style="color: #666;">— كن أول الفائزين اليوم! —</div>
        </div>

        <input type="text" id="player-name" class="name-field" placeholder="اكتب اسمك للبدء..." maxlength="12" oninput="validateInput()">
        <button class="start-btn" id="btn-start" onclick="startFestival()" disabled>ابدأ التحدي (9 مراحل) 🚀</button>
    </div>

    <div id="game-area" style="display: none;">
        <div class="stats-header">
            <span>⭐ <span id="score-num">0</span></span>
            <span>المرحلة: <span id="lvl-num">1</span>/9</span>
            <span>اللاعب: <span id="p-display"></span></span>
        </div>
        <p id="lvl-desc" style="font-size: 0.8rem; color: var(--teal); font-weight: bold; margin-bottom: 5px;"></p>
        <div class="timer-container"><div id="timer-line"></div></div>
        <div id="game-content"></div>
    </div>
</div>

<script>
    const books = [
       
        { n: "متلازمة فريجولي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/5de7db3d-393a-4443-a7d9-38a313196d3d.jpg" },
        { n: "شجرة العهد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/dc433276-1d38-4214-9e39-041c675d42e1.jpg" },
        { n: "خوف", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/ffc54c3e-9843-4401-be4c-e69329593574.png" },
        { n: "بيتشيني", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/83aea5be-3950-4056-b793-be588d6d6fd8.jpg" },
        { n: "قصّاص", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/32a21b7b-f3c9-400a-bb27-9c104f13f32a.png" },
        { n: "الغيهب", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0ef78de9-8505-472e-867e-0889f360e5f9.jpg" },
        { n: "لأنها كيارا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0579a21c-9a8a-4110-a706-d11747f904cb.png" },
        { n: "قوت", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd25b623-314d-4d3c-9b40-04f32216e854.jpg" },
        { n: "عزير", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0691769a-513b-4e54-8d36-f68ac0f80a1a.png" },
        { n: "بيت الخناس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/679c4645-834e-42f9-a351-8cde94d5a123.png" },
        { n: "حسناء الدم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/c32925e4-2631-4e5f-8041-2097e8b1c36b.jpg" },
        { n: "طائفة الشعيبة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a178864f-98f0-4682-b36e-c21344d49f96.png" },
        { n: "جمنون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/8d3a83f9-7dd5-4939-88d2-31aaa09c4119.jpg" },
        { n: "لج", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/95e264c6-5f16-4d89-b6fa-11bd8866bcda.png" },
        { n: "فندق المقبرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/27ee3566-761c-40f1-b5eb-37df72dd242e.png" },
        { n: "هلاك مبهم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/795aee56-ca9c-45f5-a686-5ee25b243456.jpg" },
        { n: "خربوشة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/80fc325c-722c-47cb-9b4d-d5c7d6642b83.png" },
        { n: "إخلاد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/b8f4b8bc-40a4-477e-a6d0-395053b6e192.jpg" },
        { n: "سكاى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/6485a3a0-8234-4623-b9f8-21b80ccfb175.jpg" },
        { n: "زيروس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/7c8a684e-81a3-4875-9182-41328fd2c313.jpg" },
        { n: "اكاسيا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/625d085f-9b81-4e5f-ab85-b26c08a8bafb.png" },
        { n: "الممر الرابع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/62c01320-e152-4dfd-a780-07aa439264e4.jpg" },
        { n: "ذكريات ومخبوزات", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/16c54ecf-6295-47fd-bd62-ab2d13d61426.png" },
        { n: "بصمة مبهرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/da7534a6-eb04-49c4-841a-4f556322eaed.jpg" },
        { n: "فردوس بوعلي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/edc7725c-73f7-443f-a7b1-872502d3b4c3.jpg" },
        { n: "فندق السيد إنسان", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/97e24005-045e-4ea3-be60-531d1f165259.jpg" }, 
        { n: "الأعمدة والكجة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd3e1d97-4baa-4d29-93ac-a9dbb677cc48.jpg" },
        { n: "نحن موتى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a9bf694e-1c06-4b78-91f4-fc3565077f3e.jpg" },
        { n: "مذكرات محامية", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/18bdeeb2-e433-4ee3-a1a2-1e1cbcd7639d.jpg" },
        { n: "هجرة مزارع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/999e6b0b-cdb9-4f58-a992-a97a68bcddfe.jpg" },
        { n: "البارون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/fdf02b08-b4cb-4e4d-b594-804bad8cf800.jpg" }

    ];

    let score = 0, currentStep = 1, sec = 30, timer, playerName = "", selectedPiece = null;

    function initApp() {
        const d = new Date().toDateString();
        let t = JSON.parse(localStorage.getItem('adab_v4_limit') || '{"date":"","count":0}');
        if (t.date !== d) t = { date: d, count: 0 };
        localStorage.setItem('adab_v4_limit', JSON.stringify(t));
        document.getElementById('tries-text').innerText = `محاولاتك اليوم: ${3 - t.count}`;
        updateLeaderboardUI();
    }

    function validateInput() {
        const v = document.getElementById('player-name').value.trim();
        const t = JSON.parse(localStorage.getItem('adab_v4_limit'));
        document.getElementById('btn-start').disabled = (v.length < 2 || t.count >= 3);
    }

    function updateLeaderboardUI() {
        const today = new Date().toDateString();
        let data = JSON.parse(localStorage.getItem('adab_v4_lb') || '[]');
        const top5 = data.filter(e => e.date === today).sort((a, b) => b.score - a.score).slice(0, 5);
        const listDiv = document.getElementById('top-5-list');
        if (top5.length > 0) {
            listDiv.innerHTML = top5.map((u, i) => {
                let p = i === 0 ? "30%" : i === 1 ? "25%" : i === 2 ? "15%" : "";
                return `<div class="rank-item">
                    <span>${i+1}. ${u.name} ${p ? `<span class="coupon-badge">${p}</span>` : ''}</span>
                    <span style="font-weight:700; color:var(--teal);">${u.score}⚡</span>
                </div>`;
            }).join('');
        }
    }

    function startFestival() {
        let t = JSON.parse(localStorage.getItem('adab_v4_limit'));
        t.count++; 
        localStorage.setItem('adab_v4_limit', JSON.stringify(t));
        playerName = document.getElementById('player-name').value.trim();
        score = 0; currentStep = 1;
        document.getElementById('home').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('p-display').innerText = playerName;
        loadStep();
    }

    function loadStep() {
        clearInterval(timer);
        selectedPiece = null;
        const steps = [
            { t: 30, s: 2, d: "رتب الغلاف  🧩" },
            { t: 25, s: 2, d: "تحدي السرعة الخاطفة ⚡" },
            { t: 40, s: 3, d: "المستوى المتوسط  🧩" },
            { t: 35, s: 3, d: "تركيز عالي.. 🧩" },
            { t: 30, s: 3, d: "أسرع للحصول على بونص! 🚀" },
            { t: 50, s: 4, d: "المستوى الصعب ) 🧩" },
            { t: 45, s: 4, d: "تحدي العباقرة 🧠" },
            { t: 40, s: 4, d: "اقتربت من النهاية! 🔥" },
            { t: 60, s: 5, d: "المرحلة الكبرى  🏆" }
        ];
        const s = steps[currentStep-1];
        document.getElementById('lvl-num').innerText = currentStep;
        document.getElementById('lvl-desc').innerText = s.d;
        sec = s.t;
        renderPuzzle(s.s);
        timer = setInterval(() => {
            sec--;
            document.getElementById('timer-line').style.width = (sec/s.t*100) + "%";
            if (sec <= 0) finish("انتهى الوقت! حاول غداً ⏰");
        }, 1000);
    }

    function renderPuzzle(size) {
        const div = document.getElementById('game-content');
        div.innerHTML = "";
        const book = books[Math.floor(Math.random()*books.length)];
        const containerSize = 280;
        const grid = document.createElement('div');
        grid.className = 'puzzle-grid';
        grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        grid.style.width = containerSize + "px"; grid.style.height = (containerSize * 1.4) + "px";
        let pieces = Array.from({length: size*size}, (_, i) => i).sort(() => 0.5 - Math.random());
        pieces.forEach((pos) => {
            const p = document.createElement('div');
            p.className = 'puzzle-piece';
            const w = containerSize/size, h = (containerSize*1.4)/size;
            p.style.width = w + "px"; p.style.height = h + "px";
            p.style.backgroundImage = `url(${book.i})`;
            p.style.backgroundSize = `${containerSize}px ${containerSize*1.4}px`;
            const bx = (pos % size) * w, by = Math.floor(pos / size) * h;
            p.style.backgroundPosition = `-${bx}px -${by}px`;
            p.dataset.correctPos = pos;
            p.onclick = () => {
                if (!selectedPiece) { selectedPiece = p; p.classList.add('selected-piece'); }
                else {
                    let tBG = p.style.backgroundPosition, tPos = p.dataset.correctPos;
                    p.style.backgroundPosition = selectedPiece.style.backgroundPosition;
                    p.dataset.correctPos = selectedPiece.dataset.correctPos;
                    selectedPiece.style.backgroundPosition = tBG;
                    selectedPiece.dataset.correctPos = tPos;
                    selectedPiece.classList.remove('selected-piece');
                    selectedPiece = null;
                    checkWin(size);
                }
            };
            grid.appendChild(p);
        });
        div.appendChild(grid);
    }

    function checkWin(size) {
        const pieces = document.querySelectorAll('.puzzle-piece');
        let win = Array.from(pieces).every((p, i) => parseInt(p.dataset.correctPos) === i);
        if (win) {
            clearInterval(timer);
            score += (sec * 10) + (currentStep * 50);
            document.getElementById('score-num').innerText = score;
            if (currentStep < 9) { currentStep++; setTimeout(loadStep, 600); }
            else finish("🏆 مبروك! ختمت التحدي بنجاح");
        }
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code).then(() => {
            alert("تم نسخ الكود: " + code);
        });
    }

    function finish(msg) {
        clearInterval(timer);
        const today = new Date().toDateString();
        let data = JSON.parse(localStorage.getItem('adab_v4_lb') || '[]');
        data.push({ name: playerName, score: score, date: today });
        localStorage.setItem('adab_v4_lb', JSON.stringify(data));
        const daily = data.filter(e => e.date === today).sort((a,b) => b.score - a.score);
        const rank = daily.findIndex(e => e.name === playerName && e.score === score) + 1;
        
        let promo = "", gift = "";
        if(rank === 1) { promo = "ADAB30"; gift = "خصم 30% للمركز الأول!"; }
        else if(rank === 2) { promo = "ADAB25"; gift = "خصم 25% للمركز الثاني!"; }
        else if(rank === 3) { promo = "ADAB15"; gift = "خصم 15% للمركز الثالث!"; }
        else if((rank/daily.length) <= 0.3) { promo = "ADAB10"; gift = "خصم 10% (نخبة الـ 30%)"; }
        else { gift = "محاولة رائعة! نافس غداً للصدراة"; }

        document.getElementById('game-content').innerHTML = `
            <div style="padding:10px;">
                <h2 style="color:var(--burgundy)">${msg}</h2>
                <h1 style="font-size:3rem; margin:5px 0; color:var(--teal)">${score}</h1>
                <p>ترتيبك اليوم: <b>#${rank}</b></p>
                <div style="background:#fff9e6; border:2px dashed var(--gold); padding:15px; border-radius:20px; margin:15px 0;">
                    <p style="font-size:0.9rem;">${gift}</p>
                    ${promo ? `<h2 id="final-promo" style="letter-spacing:2px; color:var(--burgundy); margin:5px 0;">${promo}</h2>
                    <div class="copy-btn" onclick="copyCode('${promo}')">نسخ كود الخصم 📋</div>` : ''}
                </div>
                <a href="https://adab-book.com" target="_blank" class="start-btn shop-btn">زيارة المتجر واستخدام الخصم 🛒</a>
                <button onclick="shareResult()" class="start-btn share-btn">مشاركة النتيجة 📲</button>
                <button onclick="location.reload()" class="start-btn" style="background:#888;">العودة للرئيسية</button>
            </div>
        `;
    }

    async function shareResult() {
        const text = `حققت ${score} نقطة في تحدي الأدب التفاعلي وترتيبي حالياً #${playerName}! هل يمكنك هزيمتي؟ ⚡📚`;
        if (navigator.share) {
            try { await navigator.share({ title: 'تحدي الأدب', text: text, url: window.location.href }); } catch(e){}
        } else {
            window.open(`https://wa.me{encodeURIComponent(text + " " + window.location.href)}`, '_blank');
        }
    }
</script>
</body>
</html>
