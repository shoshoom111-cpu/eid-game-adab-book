<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مهرجان ألعاب مركز الأدب العربي ⚡</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --teal: #1a9397; --burgundy: #a11f2a; --gold: #c6922a; --bg: #fdfcf9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: manipulation; }
        .main-card { background: white; padding: 1.2rem; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 95%; max-width: 390px; text-align: center; border-top: 10px solid var(--teal); position: relative; }
        .logo { width: 100%; max-width: 180px; margin-bottom: 10px; }
        .start-btn { background: var(--teal); color: white; border: none; padding: 14px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(26, 147, 151, 0.3); }
        .stats-header { display: flex; justify-content: space-around; padding: 8px; background: #f0fafa; border-radius: 12px; margin-bottom: 10px; font-size: 0.8rem; color: var(--teal); font-weight: bold; }
        .timer-container { background: #eee; height: 8px; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        #timer-line { height: 100%; background: var(--teal); width: 100%; transition: 1s linear; }
        
        .grid { display: grid; gap: 6px; justify-content: center; margin: 0 auto; }
        .m-card { width: 70px; height: 95px; cursor: pointer; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.4s; transform-style: preserve-3d; }
        .flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid #eee; }
        .back { background: var(--teal); }
        .front { background: white; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .front img { width: 100%; height: 100%; object-fit: cover; }
        
        .puzzle-grid { display: grid; gap: 2px; margin: 0 auto; background: #eee; border: 3px solid var(--teal); border-radius: 8px; }
        .puzzle-piece { cursor: pointer; background-size: cover; }
        .coupon-box { background: #fff9e6; border: 2px dashed var(--gold); padding: 15px; border-radius: 20px; margin: 15px 0; }
        .shop-btn { display: block; background: var(--teal); color: white; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body onload="initApp()">

<div class="main-card" id="card">
    <div id="home">
        <img src="https://ibharbooks.com/cdn/shop/collections/markez-adab.png?v=1738877582&width=1024" class="logo">
        <h3 style="color: var(--burgundy); margin-bottom: 5px;">مهرجان الأدب االعربي ⚡</h3>
        <p id="tries-text" style="font-size: 0.85rem; color: var(--teal); font-weight: bold; margin-bottom: 15px;"></p>
        <input type="text" id="player-name" style="width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; text-align: center; margin-bottom: 12px; font-weight: bold;" placeholder="اكتب اسمك للمنافسة..." maxlength="12" oninput="validateInput()">
        <button class="start-btn" id="btn-start" onclick="startFestival()" disabled>ابدأ التحدي  🚀</button>
    </div>

    <div id="game-area" style="display: none;">
        <div class="stats-header">
            <span>اللاعب: <span id="p-display"></span></span>
            <span>⭐ <span id="score-num">0</span></span>
            <span><span id="lvl-num">1</span>/9</span>
        </div>
        <p id="lvl-desc" style="font-size: 0.8rem; color: var(--teal); margin-bottom: 5px; font-weight: bold;"></p>
        <div class="timer-container"><div id="timer-line"></div></div>
        <div id="game-content"></div>
    </div>
</div>

<script>
    const sounds = {
        flip: new Audio('https://assets.mixkit.co'),
        success: new Audio('https://assets.mixkit.co'),
        fail: new Audio('https://assets.mixkit.co'),
        win: new Audio('https://assets.mixkit.co')
    };

    function playSfx(name) { sounds[name].currentTime = 0; sounds[name].play().catch(() => {}); }

    const books = [
       
        { n: "متلازمة فريجولي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/5de7db3d-393a-4443-a7d9-38a313196d3d.jpg" },
        { n: "شجرة العهد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/dc433276-1d38-4214-9e39-041c675d42e1.jpg" },
        { n: "خوف", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/ffc54c3e-9843-4401-be4c-e69329593574.png" },
        { n: "بيتشيني", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/83aea5be-3950-4056-b793-be588d6d6fd8.jpg" },
        { n: "قصّاص", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/32a21b7b-f3c9-400a-bb27-9c104f13f32a.png" },
        { n: "الغيهب", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0ef78de9-8505-472e-867e-0889f360e5f9.jpg" },
        { n: "لأنها كيارا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0579a21c-9a8a-4110-a706-d11747f904cb.png" },
        { n: "قوت", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd25b623-314d-4d3c-9b40-04f32216e854.jpg" },
        { n: "عزير", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0691769a-513b-4e54-8d36-f68ac0f80a1a.png" },
        { n: "بيت الخناس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/679c4645-834e-42f9-a351-8cde94d5a123.png" },
        { n: "حسناء الدم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/c32925e4-2631-4e5f-8041-2097e8b1c36b.jpg" },
        { n: "طائفة الشعيبة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a178864f-98f0-4682-b36e-c21344d49f96.png" },
        { n: "جمنون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/8d3a83f9-7dd5-4939-88d2-31aaa09c4119.jpg" },
        { n: "لج", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/95e264c6-5f16-4d89-b6fa-11bd8866bcda.png" },
        { n: "فندق المقبرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/27ee3566-761c-40f1-b5eb-37df72dd242e.png" },
        { n: "هلاك مبهم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/795aee56-ca9c-45f5-a686-5ee25b243456.jpg" },
        { n: "خربوشة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/80fc325c-722c-47cb-9b4d-d5c7d6642b83.png" },
        { n: "إخلاد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/b8f4b8bc-40a4-477e-a6d0-395053b6e192.jpg" },
        { n: "سكاى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/6485a3a0-8234-4623-b9f8-21b80ccfb175.jpg" },
        { n: "زيروس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/7c8a684e-81a3-4875-9182-41328fd2c313.jpg" },
        { n: "اكاسيا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/625d085f-9b81-4e5f-ab85-b26c08a8bafb.png" },
        { n: "الممر الرابع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/62c01320-e152-4dfd-a780-07aa439264e4.jpg" },
        { n: "ذكريات ومخبوزات", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/16c54ecf-6295-47fd-bd62-ab2d13d61426.png" },
        { n: "بصمة مبهرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/da7534a6-eb04-49c4-841a-4f556322eaed.jpg" },
        { n: "فردوس بوعلي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/edc7725c-73f7-443f-a7b1-872502d3b4c3.jpg" },
        { n: "فندق السيد إنسان", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/97e24005-045e-4ea3-be60-531d1f165259.jpg" }, 
        { n: "الأعمدة والكجة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd3e1d97-4baa-4d29-93ac-a9dbb677cc48.jpg" },
        { n: "نحن موتى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a9bf694e-1c06-4b78-91f4-fc3565077f3e.jpg" },
        { n: "مذكرات محامية", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/18bdeeb2-e433-4ee3-a1a2-1e1cbcd7639d.jpg" },
        { n: "هجرة مزارع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/999e6b0b-cdb9-4f58-a992-a97a68bcddfe.jpg" },
        { n: "البارون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/fdf02b08-b4cb-4e4d-b594-804bad8cf800.jpg" }

    ];

    let score = 0, currentStep = 1, sec = 30, timer, playerName = "", festivalPath = [], flippedCards = [];

    function initApp() {
        const today = new Date().toDateString();
        let tries = JSON.parse(localStorage.getItem('adab_v8_limit') || '{"date":"","count":0}');
        if (tries.date !== today) tries = { date: today, count: 0 };
        localStorage.setItem('adab_v8_limit', JSON.stringify(tries));
        document.getElementById('tries-text').innerText = `المحاولات المتبقية: ${3 - tries.count}`;
        validateInput();
    }

    function validateInput() {
        const val = document.getElementById('player-name').value.trim();
        const tries = JSON.parse(localStorage.getItem('adab_v8_limit'));
        document.getElementById('btn-start').disabled = (val.length < 2 || tries.count >= 3);
    }

    function startFestival() {
        let tries = JSON.parse(localStorage.getItem('adab_v8_limit'));
        tries.count++;
        localStorage.setItem('adab_v8_limit', JSON.stringify(tries));
        playerName = document.getElementById('player-name').value.trim();
        
        festivalPath = [
            { type: 'guess', blur: 3, time: 20, desc: "خمن الغلاف  📚" },
            { type: 'memory', pairs: 3, time: 30, desc: "تحدي الذاكرة 🃏" },
            { type: 'puzzle', size: 2, time: 40, desc: "رتب المربعات 🧩" },
            { type: 'guess', blur: 8, time: 20, desc: "خمن الغلاف  📚" },
            { type: 'memory', pairs: 4, time: 30, desc: "ذاكرة الأبطال 🃏" },
            { type: 'puzzle', size: 3, time: 40, desc: "تحدي اللغز 🧩" },
            { type: 'guess', blur: 15, time: 15, desc: "خمن الغلاف الغامض 📚" },
            { type: 'memory', pairs: 6, time: 25, desc: "الذاكرة الفولاذية 🃏" },
            { type: 'puzzle', size: 4, time: 45, desc: "المرحلة الكبرى 🧩" }
        ];

        document.getElementById('home').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('p-display').innerText = playerName;
        loadStep();
    }

    function loadStep() {
        clearInterval(timer);
        const step = festivalPath[currentStep - 1];
        document.getElementById('lvl-num').innerText = currentStep;
        document.getElementById('lvl-desc').innerText = step.desc;
        document.getElementById('score-num').innerText = score;
        sec = step.time;
        renderGame(step);
        timer = setInterval(() => {
            sec--;
            document.getElementById('timer-line').style.width = (sec/step.time*100) + "%";
            if(step.type === 'guess') {
                let img = document.getElementById('guess-img');
                if(img) img.style.filter = `blur(${Math.max(0, step.blur - (step.time - sec)) }px)`;
            }
            if (sec <= 0) { playSfx('fail'); finish("انتهى الوقت! حاول مجدداً."); }
        }, 1000);
    }

    function renderGame(step) {
        const div = document.getElementById('game-content'); div.innerHTML = "";
        
        if (step.type === 'memory') {
            flippedCards = [];
            let cardsData = [...books.slice(0, step.pairs), ...books.slice(0, step.pairs)].sort(() => 0.5 - Math.random());
            const grid = document.createElement('div');
            grid.className = 'grid'; grid.style.gridTemplateColumns = "repeat(3, 1fr)";
            let matchedCount = 0;

            cardsData.forEach((book, index) => {
                const card = document.createElement('div');
                card.className = 'm-card';
                card.innerHTML = `<div class="card-inner"><div class="face back"></div><div class="face front"><img src="${book.i}"></div></div>`;
                
                card.onclick = function() {
                    if (flippedCards.length < 2 && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
                        playSfx('flip');
                        card.classList.add('flipped');
                        flippedCards.push({ card, name: book.n });

                        if (flippedCards.length === 2) {
                            if (flippedCards[0].name === flippedCards[1].name) {
                                flippedCards.forEach(c => c.card.classList.add('matched'));
                                score += 50 + (sec * 2);
                                matchedCount++;
                                flippedCards = [];
                                if (matchedCount === step.pairs) { 
                                    playSfx('success'); 
                                    setTimeout(nextStep, 800); 
                                }
                            } else {
                                setTimeout(() => {
                                    flippedCards.forEach(c => c.card.classList.remove('flipped'));
                                    flippedCards = [];
                                }, 600);
                            }
                        }
                    }
                };
                grid.appendChild(card);
            });
            div.appendChild(grid);
        } else if (step.type === 'guess') {
            const book = books[Math.floor(Math.random()*books.length)];
            div.innerHTML = `<img src="${book.i}" id="guess-img" style="width:130px; filter:blur(${step.blur}px); border-radius:12px; margin-bottom:12px; border:4px solid var(--teal); transition:0.5s;">
                             <div id="opts" style="display:grid; gap:8px; grid-template-columns:1fr 1fr;"></div>`;
            [book.n, ...books.filter(x=>x.n!=book.n).slice(0,3).map(x=>x.n)].sort().forEach(o => {
                const btn = document.createElement('button'); btn.className = 'start-btn'; btn.style.fontSize="0.8rem"; btn.innerText = o;
                btn.onclick = () => { 
                    if(o === book.n) { playSfx('success'); score += 100 + (sec * 5); nextStep(); } 
                    else { playSfx('fail'); finish(`للأسف! كان الكتاب هو "${book.n}"`); }
                };
                document.getElementById('opts').appendChild(btn);
            });
        } else if (step.type === 'puzzle') {
            const book = books[Math.floor(Math.random()*books.length)];
            const size = step.size;
            const pGrid = document.createElement('div');
            pGrid.className = 'puzzle-grid'; pGrid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            pGrid.style.width = "210px";
            let pieces = Array.from({length: size*size}, (_, i) => i).sort(() => 0.5 - Math.random());
            let selected = null;

            pieces.forEach((pos, idx) => {
                const p = document.createElement('div');
                p.className = 'puzzle-piece';
                p.style.width = `${210/size}px`; p.style.height = `${280/size}px`;
                p.style.backgroundImage = `url(${book.i})`;
                p.style.backgroundPosition = `${-(pos % size) * (210/size)}px ${-Math.floor(pos / size) * (280/size)}px`;
                p.dataset.orig = pos;
                
                p.onclick = () => {
                    playSfx('flip');
                    if(!selected) { 
                        selected = p; p.style.outline = "3px solid gold"; 
                    } else {
                        let tBg = p.style.backgroundPosition, tO = p.dataset.orig;
                        p.style.backgroundPosition = selected.style.backgroundPosition; p.dataset.orig = selected.dataset.orig;
                        selected.style.backgroundPosition = tBg; selected.dataset.orig = tO;
                        selected.style.outline = "none"; selected = null;
                        if([...pGrid.children].every((pc, i) => parseInt(pc.dataset.orig) === i)) { 
                            playSfx('success'); score += 150 + (sec * 10); setTimeout(nextStep, 600); 
                        }
                    }
                };
                pGrid.appendChild(p);
            });
            div.appendChild(pGrid);
        }
    }

    function nextStep() {
        if(currentStep < 9) { currentStep++; loadStep(); }
        else { playSfx('win'); finish("🏆 كفو! أتممت التحدي بنجاح مذهل."); }
    }

    function finish(msg) {
        clearInterval(timer);
        let b = JSON.parse(localStorage.getItem('adab_v8_lb') || '[]');
        if (msg.includes("نجاح")) {
            b.push({n: playerName, s: score}); b.sort((x,y) => y.s - x.s);
            localStorage.setItem('adab_v8_lb', JSON.stringify(b.slice(0, 10)));
        }
        let rank = b.findIndex(i => i.n === playerName && i.s === score) + 1;
        let coupon = "GIFT5", disc = "5%";
        if(rank === 1) { coupon = "WIN30"; disc = "30%"; }
        else if(rank === 2) { coupon = "WIN20"; disc = "20%"; }
        else if(rank === 3) { coupon = "WIN15"; disc = "15%"; }

        document.getElementById('game-area').innerHTML = `
            <h3 style="color:var(--burgundy)">${msg}</h3>
            <p style="font-weight:bold; margin-top:8px; color:var(--teal)">نقاطك: ${score}</p>
            <div class="coupon-box">
                <p style="font-size:0.8rem; font-weight:bold;">ترتيبك: ${rank || 'مشارك'}</p>
                <h2 style="color:var(--teal); letter-spacing:2px; margin:8px 0;">${coupon}</h2>
                <p style="font-size:0.85rem;">كود خصم بقيمة <b>${disc}</b></p>
            </div>
            <a href="https://adab-book.com" target="_blank" class="shop-btn">🛒 تسوق الآن في أدب بوك</a>
            <button class="start-btn" onclick="location.reload()" style="margin-top:15px; background:white; color:var(--teal); border:2px solid var(--teal); font-size:0.8rem;">🔄 العودة للرئيسية</button>
        `;
    }
</script>
</body>
</html>
