<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>مهرجان ألعاب مركز الأدب العربي ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --teal: #1a9397; 
            --burgundy: #a11f2a; 
            --gold: #c6922a; 
            --bg: #fdfcf9; 
        }
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            touch-action: manipulation; 
        }
        .main-card { 
            background: white; 
            padding: 1.2rem; 
            border-radius: 30px; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.12); 
            width: 95%; 
            max-width: 400px; 
            text-align: center; 
            border-top: 10px solid var(--teal); 
            max-height: 98vh; 
            overflow-y: auto; 
            position: relative; 
        }
        .logo { 
            width: 100%; 
            max-width: 180px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
        }
        .name-field { 
            width: 100%; 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid #eee; 
            text-align: center; 
            margin: 10px 0; 
            font-size: 1.1rem; 
            font-weight: bold; 
            outline: none; 
        }
        .name-field:focus { border-color: var(--teal); }
        .start-btn { 
            background: var(--teal); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1.1rem; 
            box-shadow: 0 5px 15px rgba(26, 147, 151, 0.3); 
            transition: 0.2s; 
            margin-top: 5px; 
            text-decoration: none; 
            display: block; 
        }
        .start-btn:disabled { 
            opacity: 0.3; 
            background: #ccc; 
            cursor: not-allowed; 
            box-shadow: none;
        }
        .start-btn:active:not(:disabled) { transform: scale(0.97); }
        #countdown-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(255,255,255,0.95); 
            z-index: 100; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            border-radius: 30px; 
            pointer-events: none; 
        }
        #countdown-text { 
            font-size: 5rem; 
            font-weight: bold; 
            color: var(--teal); 
        }
        .stats-header { 
            display: flex; 
            justify-content: space-around; 
            padding: 8px; 
            background: #f0fafa; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
            color: var(--teal); 
            font-weight: bold; 
        }
        .timer-container { 
            background: #eee; 
            height: 8px; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            overflow: hidden; 
        }
        #timer-line { 
            height: 100%; 
            background: var(--teal); 
            width: 100%; 
            transition: 1s linear; 
        }
        
        .puzzle-grid { 
            display: grid; 
            gap: 0px; 
            margin: 10px auto; 
            background: #eee; 
            border: 4px solid var(--teal); 
            border-radius: 10px; 
            overflow: hidden; 
            width: 280px; 
            height: 380px; 
        }
        .puzzle-piece { 
            cursor: pointer; 
            background-repeat: no-repeat; 
            border: 0.1px solid rgba(255,255,255,0.2); 
            width: 100%; 
            height: 100%; 
            transition: 0.1s;
        }
        .selected-piece { 
            outline: 4px solid var(--gold); 
            outline-offset: -4px; 
            z-index: 10; 
            transform: scale(0.98); 
        }
        
        .memory-grid {
            display: grid;
            gap: 10px;
            margin: 10px 0;
        }
        .memory-card { 
            height: 85px; 
            background: var(--teal); 
            border-radius: 10px; 
            cursor: pointer; 
            color: white; 
            font-size: 1.5rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-size: cover; 
            background-position: center; 
            transition: 0.3s;
            font-weight: bold;
        }
        .memory-card[data-done="true"] { 
            opacity: 0.5; 
            pointer-events: none; 
            cursor: default;
        }
        .memory-card[data-open="true"] { 
            pointer-events: none; 
        }
        
        .guess-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .guess-btn {
            background: white;
            border: 2px solid var(--teal);
            color: var(--teal);
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .guess-btn:active {
            background: var(--teal);
            color: white;
        }
        
        .prize-box {
            background: #fff9e6;
            border: 2px dashed var(--gold);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }
        .leaderboard {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 12px;
            margin: 10px 0;
            max-height: 180px;
            overflow-y: auto;
            text-align: right;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #eee;
            font-size: 0.8rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--gold); }
            50% { box-shadow: 0 0 30px var(--gold), 0 0 60px var(--teal); }
            100% { box-shadow: 0 0 5px var(--gold); }
        }
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        .winner-glow {
            animation: glow 1.5s ease-in-out infinite;
        }
        
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .adabbook-link {
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(135deg, #1a9397, #a11f2a);
            border-radius: 15px;
            color: white;
            animation: fadeIn 0.5s ease;
        }
        .adabbook-link:hover {
            transform: scale(1.02);
            transition: 0.3s;
        }
        .shop-btn {
            display: inline-block;
            background: white;
            color: var(--burgundy);
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .shop-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .shop-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

    let score = 0, currentStep = 1, sec = 30, timer, playerName = "", selectedPiece = null, memoryFlipped = [], randomizedSteps = [];
    let gameActive = true;
    let animationFrame = null;

    const easyPool = [
        { type: 'guess', t: 20, blur: 1, d: "خمن الكتاب (سهل) 📚" },
        { type: 'memory', t: 30, pairs: 2, d: "طابق البطاقات (سهل) 🃏" },

        { type: 'puzzle', t: 50, s: 3, d: "رتب الغلاف (3×3) 🧩" }
    ];

        { type: 'guess', t: 12, blur: 6, d: "خمن الكتاب (صعب) 🔥" },
        { type: 'memory', t: 45, pairs: 4, d: "الذاكرة الفولاذية (صعب) 🃏" },
        { type: 'puzzle', t: 70, s: 4, d: "المرحلة الكبرى (4×4) 🏆" }
    ];

    // ==================== نظام الصوت ====================
    let audioContext = null;
    let isMuted = false;

    function initAudio() {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
    }

    function playCorrectSound() {
        if (!audioContext || isMuted) return;
        try {
            const now = audioContext.currentTime;
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.value = 0.15;
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start(now + i * 0.1);
                osc.stop(now + i * 0.1 + 0.15);
            });
        } catch(e) {}
    }

    function playWrongSound() {
        if (!audioContext || isMuted) return;
        try {
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 220;
            gain.gain.value = 0.15;
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start(now);
            osc.frequency.exponentialRampToValueAtTime(110, now + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.stop(now + 0.3);
        } catch(e) {}
    }

    function playWinSound() {
        if (!audioContext || isMuted) return;
        try {
            const now = audioContext.currentTime;
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, index) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.value = 0.15;
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start(now + index * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.15 + 0.3);
                osc.stop(now + index * 0.15 + 0.3);
            });
        } catch(e) {}
    }

    function playTimerSound() {
        if (!audioContext || isMuted) return;
        try {
            const now = audioContext.currentTime;
            for(let i = 0; i < 3; i++) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'square';
                osc.frequency.value = 440;
                gain.gain.value = 0.1;
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start(now + i * 0.2);
                osc.stop(now + i * 0.2 + 0.1);
            }
        } catch(e) {}
    }

    function playSound(type) {
        if (!audioContext) {
            initAudio();
            return;
        }
        if (audioContext.state === 'suspended') {
            audioContext.resume().then(() => {
                playSoundByType(type);
            });
        } else {
            playSoundByType(type);
        }
    }

    function playSoundByType(type) {
        switch(type) {
            case 'correct': playCorrectSound(); break;
            case 'wrong': playWrongSound(); break;
            case 'win': playWinSound(); break;
            case 'timer': playTimerSound(); break;
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        const muteBtn = document.getElementById('mute-btn');
        if (muteBtn) muteBtn.innerText = isMuted ? '🔇' : '🔊';
    }

    document.addEventListener('click', function initAudioOnFirstClick() {
        initAudio();
        document.removeEventListener('click', initAudioOnFirstClick);
    }, { once: true });

    // ==================== نظام الاحتفالية ====================
    function startCelebration() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const colors = ['#1a9397', '#a11f2a', '#c6922a', '#f5d742', '#ffffff', '#ff6b6b', '#4ecdc4'];
        
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: Math.random() * 3 + 2,
                angle: Math.random() * Math.PI * 2,
                spin: Math.random() * 0.1 - 0.05
            });
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.y += p.speed;
                p.x += Math.sin(p.angle) * 0.5;
                p.angle += p.spin;
                
                if (p.y > canvas.height) {
                    p.y = -10;
                    p.x = Math.random() * canvas.width;
                }
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            });
            
            animationFrame = requestAnimationFrame(animate);
        }
        
        animate();
        
        setTimeout(() => {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }, 7000);
    }

    // ==================== دوال المساعدة ====================
    function shuffle(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function initApp() {
        const d = new Date().toDateString();
        let t = JSON.parse(localStorage.getItem('adab_v18_limit') || '{"date":"","count":0}');
        if (t.date !== d) {
            t = { date: d, count: 0 };
        }
        localStorage.setItem('adab_v18_limit', JSON.stringify(t));
        updateTriesDisplay();
    }

    function updateTriesDisplay() {
        const t = JSON.parse(localStorage.getItem('adab_v18_limit') || '{"date":"","count":0}');
        const remaining = 3 - t.count;
        document.getElementById('tries-text').innerText = `المحاولات المتبقية اليوم: ${remaining}`;
    }

    function validateInput() {
        const v = document.getElementById('player-name').value.trim();
        const t = JSON.parse(localStorage.getItem('adab_v18_limit') || '{"date":"","count":0}');
        const btn = document.getElementById('btn-start');
        
        if (v.length >= 2 && t.count < 3) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
    }

    function startFestival() {
        const t = JSON.parse(localStorage.getItem('adab_v18_limit') || '{"date":"","count":0}');
        const today = new Date().toDateString();
        
        if (t.date !== today) {
            t.date = today;
            t.count = 0;
        }
        
        if (t.count >= 3) {
            alert("لقد استنفذت جميع محاولاتك اليوم! تعال غداً لتلعب مرة أخرى 🎮");
            return;
        }
        
        playerName = document.getElementById('player-name').value.trim();
        if (playerName.length < 2) {
            alert("الرجاء إدخال اسم صحيح (حرفين على الأقل)");
            return;
        }
        
        t.count++;
        localStorage.setItem('adab_v18_limit', JSON.stringify(t));
        updateTriesDisplay();
        
        randomizedSteps = [...shuffle(easyPool), ...shuffle(medPool), ...shuffle(hardPool)];
        score = 0; 
        currentStep = 1;
        gameActive = true;
        
        document.getElementById('home').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('score-num').innerText = '0';
        
        showCountdown(loadStep);
    }

    function showCountdown(cb) {
        const ov = document.getElementById('countdown-overlay');
        const txt = document.getElementById('countdown-text');
        ov.style.display = 'flex';
        let c = 3; 
        txt.innerText = c;
        
        let ct = setInterval(() => {
            c--;
            if (c > 0) {
                txt.innerText = c;
            } else if (c === 0) {
                txt.innerText = "انطلق!";
            } else { 
                clearInterval(ct); 
                ov.style.display = 'none'; 
                cb(); 
            }
        }, 800);
    }

    function loadStep() {
        if (!gameActive) return;
        
        clearInterval(timer);
        selectedPiece = null; 
        memoryFlipped = [];
        
        const s = randomizedSteps[currentStep - 1];
        document.getElementById('lvl-num').innerText = currentStep;
        document.getElementById('lvl-desc').innerText = s.d;
        sec = s.t;
        
        const timerLine = document.getElementById('timer-line');
        timerLine.style.width = "100%";
        
        const div = document.getElementById('game-content'); 
        div.innerHTML = "";

        if (s.type === 'guess') renderGuess(s.blur);
        else if (s.type === 'memory') renderMemory(s.pairs);
        else if (s.type === 'puzzle') renderPuzzle(s.s);

        timer = setInterval(() => {
            sec--;
            timerLine.style.width = (sec / s.t * 100) + "%";
            
            if (sec === 5) playSound('timer');
            
            if (sec <= 0) {
                gameActive = false;
                finish("للأسف، انتهى الوقت! ⏰", false);
            }
        }, 1000);
    }

    function renderGuess(blur) {
        const correct = books[Math.floor(Math.random() * books.length)];
        let otherBooks = books.filter(b => b.n !== correct.n);
        let options = shuffle(otherBooks).slice(0, 3);
        options.push(correct);
        options = shuffle(options);
        
        let html = `
            <img src="${correct.i}" style="width:160px; filter:blur(${blur}px); border-radius:15px; margin:15px auto; display:block;">
            <div class="guess-grid">
        `;
        
        options.forEach(b => {
            html += `<button class="guess-btn" onclick="checkGuess('${b.n.replace(/'/g, "\\'")}', '${correct.n.replace(/'/g, "\\'")}')">${b.n}</button>`;
        });
        
        html += `</div>`;
        document.getElementById('game-content').innerHTML = html;
    }

    function checkGuess(s, c) { 
        if (!gameActive) return;
        
        if (s === c) { 
            playSound('correct');
            score += (sec * 5) + 50; 
            document.getElementById('score-num').innerText = score;
            
            if (currentStep === 9) {
                gameActive = false;
                playSound('win');
                finish("🎉 مبروك! لقد ختمت جميع المراحل بنجاح", true);
            } else {
                nextStep(); 
            }
        } else { 
            playSound('wrong');
            gameActive = false;
            finish("إجابة خاطئة! ❌", false); 
        } 
    }

    function renderMemory(pairs) {
        const div = document.getElementById('game-content');
        let gameBooks = shuffle(books).slice(0, pairs);
        let cardsData = shuffle([...gameBooks, ...gameBooks]);
        
        const grid = document.createElement('div');
        grid.className = 'memory-grid';
        grid.style.gridTemplateColumns = `repeat(2, 1fr)`;
        
        cardsData.forEach(book => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.innerText = "?";
            
            card.onclick = () => {
                if (!gameActive) return;
                if (memoryFlipped.length < 2 && !card.dataset.done && !card.dataset.open) {
                    card.innerText = ""; 
                    card.style.backgroundImage = `url(${book.i})`;
                    card.dataset.name = book.n; 
                    card.dataset.open = "true"; 
                    memoryFlipped.push(card);
                    
                    if (memoryFlipped.length === 2) {
                        if (memoryFlipped[0].dataset.name === memoryFlipped[1].dataset.name) {
                            playSound('correct');
                            memoryFlipped.forEach(c => { 
                                c.dataset.done = "true"; 
                                c.style.opacity = "0.7";
                            });
                            memoryFlipped = [];
                            
                            if (document.querySelectorAll('[data-done="true"]').length === pairs * 2) { 
                                score += (sec * 5) + 100; 
                                document.getElementById('score-num').innerText = score;
                                
                                if (currentStep === 9) {
                                    gameActive = false;
                                    playSound('win');
                                    finish("🎉 مبروك! لقد ختمت جميع المراحل بنجاح", true);
                                } else {
                                    nextStep(); 
                                }
                            }
                        } else {
                            playSound('wrong');
                            setTimeout(() => { 
                                memoryFlipped.forEach(c => { 
                                    c.innerText = "?"; 
                                    c.style.backgroundImage = ""; 
                                    delete c.dataset.open;
                                    delete c.dataset.name;
                                }); 
                                memoryFlipped = []; 
                            }, 600);
                        }
                    }
                }
            };
            grid.appendChild(card);
        });
        div.appendChild(grid);
    }

    function renderPuzzle(size) {
        const div = document.getElementById('game-content');
        const book = books[Math.floor(Math.random() * books.length)];
        const grid = document.createElement('div');
        grid.className = 'puzzle-grid';
        grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        
        const containerW = 280, containerH = 380;
        let totalPieces = size * size;
        
        let correctPositions = Array.from({ length: totalPieces }, (_, i) => i);
        let shuffledPositions = shuffle(correctPositions);

        shuffledPositions.forEach((position, index) => {
            const p = document.createElement('div');
            p.className = 'puzzle-piece';
            
            const w = containerW / size;
            const h = containerH / size;
            
            p.style.backgroundImage = `url(${book.i})`;
            p.style.backgroundSize = `${containerW}px ${containerH}px`;
            
            const bx = (position % size) * w;
            const by = Math.floor(position / size) * h;
            p.style.backgroundPosition = `-${bx}px -${by}px`;
            
            p.dataset.correctPosition = position;

            p.onclick = () => {
                if (!gameActive) return;
                
                if (!selectedPiece) {
                    selectedPiece = p;
                    p.classList.add('selected-piece');
                } else if (selectedPiece === p) {
                    selectedPiece.classList.remove('selected-piece');
                    selectedPiece = null;
                } else {
                    let piece1 = selectedPiece;
                    let piece2 = p;
                    
                    let tempBG = piece1.style.backgroundPosition;
                    piece1.style.backgroundPosition = piece2.style.backgroundPosition;
                    piece2.style.backgroundPosition = tempBG;
                    
                    let tempCorrect = piece1.dataset.correctPosition;
                    piece1.dataset.correctPosition = piece2.dataset.correctPosition;
                    piece2.dataset.correctPosition = tempCorrect;
                    
                    piece1.classList.remove('selected-piece');
                    selectedPiece = null;
                    
                    const allPieces = document.querySelectorAll('.puzzle-piece');
                    let win = true;
                    
                    allPieces.forEach((piece, idx) => {
                        if (parseInt(piece.dataset.correctPosition) !== idx) {
                            win = false;
                        }
                    });

                    if (win) {
                        playSound('win');
                        score += (sec * 10) + 200;
                        document.getElementById('score-num').innerText = score;
                        
                        if (currentStep === 9) {
                            gameActive = false;
                            finish("🎉 مبروك! لقد ختمت جميع المراحل بنجاح", true);
                        } else {
                            nextStep();
                        }
                    }
                }
            };
            grid.appendChild(p);
        });
        
        div.appendChild(grid);
    }

    function nextStep() {
        clearInterval(timer);
        if (currentStep < 9) { 
            currentStep++; 
            loadStep(); 
        }
    }

        function finish(msg, wonAll) {
        clearInterval(timer);
        
        const today = new Date().toDateString();
        let leaderboard = JSON.parse(localStorage.getItem('adab_v18_lb') || '[]');
        
        const existingEntryIndex = leaderboard.findIndex(entry => entry.name === playerName && entry.date === today);
        
        if (existingEntryIndex !== -1) {
            if (score > leaderboard[existingEntryIndex].score) {
                leaderboard[existingEntryIndex].score = score;
            }
        } else {
            leaderboard.push({ name: playerName, score: score, date: today });
        }
        
        localStorage.setItem('adab_v18_lb', JSON.stringify(leaderboard));
        
        const daily = leaderboard
            .filter(e => e.date === today)
            .sort((a, b) => b.score - a.score);
        
        const rank = daily.findIndex(e => e.name === playerName && e.score === score) + 1;
        
        let promo = "ADAB5";
        let prizeMsg = "كود الخصم التقديري:";
        
        if (wonAll) {
            if (rank === 1) promo = "ADAB30";
            else if (rank === 2) promo = "ADAB25";
            else if (rank === 3) promo = "ADAB15";
            else promo = "ADAB10";
            prizeMsg = "كود الفوز المكتسب:";
            startCelebration();
        }

        document.getElementById('game-content').innerHTML = `
            <h2 style="color: ${wonAll ? 'var(--teal)' : 'var(--burgundy)'}; margin: 15px 0;">${msg}</h2>
            <h1 style="font-size:3rem; color:var(--teal); margin: 10px 0;">${score}⚡</h1>
            <p style="font-size:1.2rem; margin:10px 0;">ترتيبك اليوم: #${rank}</p>
            <div style="background:#fff9e6; border:2px dashed var(--gold); padding:20px; border-radius:15px; margin:20px 0; ${wonAll ? 'animation: glow 1.5s ease-in-out infinite;' : ''}">
                <p style="font-size:1rem; margin-bottom:5px;">${prizeMsg}</p>
                <h2 style="color:var(--burgundy); letter-spacing:2px; margin:10px 0; font-size:2rem;">${promo}</h2>
                ${wonAll ? `
                    <button class="start-btn" style="font-size:0.9rem; padding:10px; width:auto; margin:0 auto;" onclick="navigator.clipboard.writeText('${promo}');alert('✅ تم نسخ الكود بنجاح!')">
                        نسخ الكود 📋
                    </button>
                ` : ''}
            </div>
            
            <!-- رابط متجر أدب بوك -->
            <div class="https://adab-book.com/">
                <p style="font-size: 1rem; margin-bottom: 10px;">📚 تسوق الآن من</p>
                <h3 style="font-size: 1.5rem; margin-bottom: 10px;">متجر أدب بوك</h3>
                <p style="font-size: 0.9rem; margin-bottom: 15px;">أفضل الكتب الأدبية بانتظارك</p>
                <a href="https://adabbook.com" target="_blank" class="shop-btn">
                    تسوق الآن 🛒
                </a>
            </div>
            
            <div class="leaderboard">
                <h4 style="border-bottom:1px solid #ddd; padding-bottom:5px;">🏆 أفضل 10 اليوم:</h4>
                ${daily.slice(0, 10).map((u, i) => `
                    <div class="leaderboard-item">
                        <span>${i+1}. ${u.name} ${u.name === playerName ? '⭐' : ''}</span>
                        <span>${u.score}⚡</span>
                    </div>
                `).join('')}
            </div>
            <button onclick="location.reload()" class="start-btn" style="background:#888; margin-top:15px;">
                العودة للرئيسية 🏠
            </button>
        `;
    }
</script>
