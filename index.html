<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مهرجان ألعاب مركز الأدب العربي ⚡</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --teal: #1a9397; --burgundy: #a11f2a; --gold: #c6922a; --bg: #fdfcf9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .main-card { background: white; padding: 1.5rem; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); width: 92%; max-width: 420px; text-align: center; border-top: 12px solid var(--teal); position: relative; max-height: 95vh; overflow-y: auto; transition: 0.3s; }
        
        /* شاشة الدخول */
        .name-field { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ddd; text-align: center; font-size: 1.1rem; margin: 10px 0; outline: none; font-weight: bold; }
        .name-field:focus { border-color: var(--teal); background: #f0fafa; }
        
        .menu-btn { background: white; color: var(--teal); border: 2.5px solid var(--teal); padding: 12px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.3s; font-size: 1rem; }
        .menu-btn:hover:not(:disabled) { background: var(--teal); color: white; }
        .menu-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .stats-header { display: flex; justify-content: space-around; padding: 10px; background: #f0fafa; border-radius: 12px; margin-bottom: 15px; font-size: 0.85rem; color: var(--teal); font-weight: bold; border: 1px solid #e0f2f2; }
        .timer-container { background: #eee; height: 8px; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        #timer-line { height: 100%; background: var(--teal); width: 100%; transition: 1s linear; }

        /* الألعاب */
        .grid { display: grid; gap: 8px; justify-content: center; margin: 0 auto; }
        .m-card { width: 75px; height: 105px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1.5px solid #eee; }
        .back { background: var(--teal); border: 2px solid white; }
        .front { background: white; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .front img { width: 100%; height: 100%; object-fit: cover; }

        .puzzle-grid { display: grid; gap: 2px; margin: 0 auto; background: #ddd; border: 3px solid var(--teal); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .puzzle-piece { background-size: 240px 320px; cursor: pointer; transition: 0.2s; }
        .selected-piece { outline: 4px solid var(--gold); z-index: 10; transform: scale(1.05); box-shadow: 0 0 15px var(--gold); }

        /* شاشة النهاية */
        .coupon-box { background: #fff9e6; border: 2px dashed var(--gold); padding: 15px; border-radius: 15px; margin: 15px 0; animation: pop 0.5s ease; }
        @keyframes pop { from {transform: scale(0.8); opacity:0;} to {transform: scale(1); opacity:1;} }
        
        .lb-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; background: #fff; border-radius: 10px; overflow: hidden; }
        .lb-table th { background: var(--teal); color: white; padding: 10px; }
        .lb-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .highlight { background: #e0f2f2; font-weight: bold; color: var(--burgundy); }
        
        .share-btn { background: #25D366; color: white; border: none; padding: 12px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .copy-btn { background: var(--gold); color: white; border: none; padding: 5px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body onload="initApp()">

<div class="main-card">
    <!-- شاشة البداية -->
    <div id="home">
<!-- استبدل سطر الصورة بهذا السطر -->
<a href="https://adab-book.com" target="_blank">
    <img src="https://adab-book.com" style="width: 140px; margin-bottom: 10px;" onerror="this.src='https://via.placeholder.com'">
</a>
        <h2 style="color: var(--burgundy); margin: 0;"تحديات للقراء  </h2>
        <p id="tries-text" style="font-size: 0.9rem; color: var(--teal); font-weight: bold; margin: 10px 0;"></p>
        
        <input type="text" id="player-name" class="name-field" placeholder="ادخل اسمك..." maxlength="12" oninput="validateInput()">
        
        <div id="main-menu">
            <button class="menu-btn" id="btn-memory" onclick="startFlow('memory')" disabled>🃏 ذاكرة الأغلفة </button>
            <button class="menu-btn" id="btn-puzzle" onclick="startFlow('puzzle')" disabled>🧩 لغز التركيب </button>
            <button class="menu-btn" id="btn-guess" onclick="startFlow('guess')" disabled>📚 خمن العنوان </button>
        </div>
        <p id="limit-msg" style="color: red; font-size: 0.85rem; display: none; font-weight: bold;">استنفدت محاولاتك الـ 3 لهذا اليوم! نراك غداً.</p>
    </div>

    <!-- منطقة اللعب -->
    <div id="game-area" style="display: none;">
        <div class="stats-header">
            <span>اللاعب: <span id="p-display" style="color:var(--burgundy)"></span></span>
            <span>مرحلة: <span id="lvl-num">1</span>/3</span>
            <span>⭐ <span id="score-num">0</span></span>
        </div>
        <div class="timer-container"><div id="timer-line"></div></div>
        <div id="game-content"></div>
    </div>
</div>

<script>
    const books = [
        { n: "خوف", i: "https://picsum.photos" },
        { n: "الغيهب", i: "https://picsum.photos" },
        { n: "بيتشيني", i: "https://picsum.photos" },
        { n: "متلازمة فريجولي", i: "https://picsum.photos" },
        { n: "أبابيل", i: "https://picsum.photos" },
        { n: "قوت", i: "https://picsum.photos" }
    ];

    let score = 0, currentLvl = 1, sec = 30, timer, playerName = "", currentGame = "", selectedPiece = null;
    
    // إعدادات تدرج الصعوبة لكل لعبة
    const config = {
        memory: { times: [40, 30, 20], pairs: [3, 4, 6], cols: [3, 4, 4] },
        puzzle: { times: [60, 45, 30], sizes: [2, 3, 4] },
        guess:  { times: [25, 15, 10], blur: [8, 18, 28] }
    };

    function initApp() {
        const today = new Date().toDateString();
        let tries = JSON.parse(localStorage.getItem('adab_limit_2026') || '{"date":"","count":0}');
        
        if (tries.date !== today) {
            tries = { date: today, count: 0 };
            localStorage.setItem('adab_limit_2026', JSON.stringify(tries));
        }
        
        document.getElementById('tries-text').innerText = `المحاولات المتبقية اليوم: ${3 - tries.count}`;
        if (tries.count >= 3) {
            document.getElementById('player-name').disabled = true;
            document.getElementById('limit-msg').style.display = 'block';
        }
    }

    function validateInput() {
        const val = document.getElementById('player-name').value.trim();
        const tries = JSON.parse(localStorage.getItem('adab_limit_2026'));
        const isValid = val.length >= 2 && tries.count < 3;
        ['btn-memory', 'btn-puzzle', 'btn-guess'].forEach(id => document.getElementById(id).disabled = !isValid);
    }

    function startFlow(type) {
        let tries = JSON.parse(localStorage.getItem('adab_limit_2026'));
        tries.count++;
        localStorage.setItem('adab_limit_2026', JSON.stringify(tries));
        
        playerName = document.getElementById('player-name').value.trim();
        score = 0; currentLvl = 1; currentGame = type;
        document.getElementById('home').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('p-display').innerText = playerName;
        loadGame();
    }

    function loadGame() {
        clearInterval(timer);
        selectedPiece = null;
        document.getElementById('lvl-num').innerText = currentLvl;
        document.getElementById('score-num').innerText = score;
        sec = config[currentGame].times[currentLvl - 1];
        renderContent();
        
        timer = setInterval(() => {
            sec--;
            document.getElementById('timer-line').style.width = (sec/config[currentGame].times[currentLvl-1]*100) + "%";
            if (sec <= 0) finish("انتهى الوقت! حاول أن تكون أسرع في المرة القادمة.");
        }, 1000);
    }

    function renderContent() {
        const div = document.getElementById('game-content'); div.innerHTML = "";
        
        // 🃏 لعبة الذاكرة
        if (currentGame === 'memory') {
            const pCount = config.memory.pairs[currentLvl-1];
            let sel = [...books].sort(() => 0.5-Math.random()).slice(0, pCount);
            let cards = [...sel, ...sel].sort(() => 0.5-Math.random());
            const grid = document.createElement('div');
            grid.className = 'grid'; grid.style.gridTemplateColumns = `repeat(${config.memory.cols[currentLvl-1]}, 1fr)`;
            let flipped = [], matched = 0;
            cards.forEach(b => {
                const c = document.createElement('div'); c.className = 'm-card';
                c.innerHTML = `<div class="card-inner"><div class="face back"></div><div class="face front"><img src="${b.i}"></div></div>`;
                c.onclick = () => {
                    if(flipped.length < 2 && !c.classList.contains('flipped')) {
                        c.classList.add('flipped'); flipped.push({c, b});
                        if(flipped.length === 2) {
                            if(flipped[0].b.n === flipped[1].b.n) {
                                matched++; score += 30 + (sec * 2); flipped = []; 
                                if(matched === pCount) setTimeout(nextLevel, 600);
                            } else { setTimeout(() => { flipped.forEach(x => x.c.classList.remove('flipped')); flipped = []; }, 600); }
                        }
                    }
                };
                grid.appendChild(c);
            });
            div.appendChild(grid);
        }

        // 🧩 لعبة اللغز
        if (currentGame === 'puzzle') {
            const size = config.puzzle.sizes[currentLvl-1];
            const book = books[Math.floor(Math.random()*books.length)];
            const pGrid = document.createElement('div');
            pGrid.className = 'puzzle-grid'; pGrid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            pGrid.style.width = '240px';
            let pieces = Array.from({length: size*size}, (_, i) => i).sort(() => 0.5-Math.random());
            pieces.forEach((pos, idx) => {
                const p = document.createElement('div'); p.className = 'puzzle-piece';
                p.style.width = `${240/size}px`; p.style.height = `${320/size}px`;
                p.style.backgroundImage = `url(${book.i})`;
                p.style.backgroundPosition = `${-(pos % size) * (240/size)}px ${-Math.floor(pos / size) * (320/size)}px`;
                p.dataset.orig = pos;
                p.onclick = () => {
                    if(!selectedPiece) { selectedPiece = p; p.classList.add('selected-piece'); }
                    else {
                        let tmpBg = p.style.backgroundPosition, tmpO = p.dataset.orig;
                        p.style.backgroundPosition = selectedPiece.style.backgroundPosition;
                        p.dataset.orig = selectedPiece.dataset.orig;
                        selectedPiece.style.backgroundPosition = tmpBg;
                        selectedPiece.dataset.orig = tmpO;
                        selectedPiece.classList.remove('selected-piece'); selectedPiece = null;
                        if([...pGrid.children].every((pc, i) => parseInt(pc.dataset.orig) === i)) { 
                            score += 50 + (sec * 5); setTimeout(nextLevel, 600); 
                        }
                    }
                };
                pGrid.appendChild(p);
            });
            div.appendChild(pGrid);
        }

        // 📚 لعبة التخمين
        if (currentGame === 'guess') {
            const book = books[Math.floor(Math.random()*books.length)];
            div.innerHTML = `<img src="${book.i}" id="guess-img" style="width:160px; filter:blur(${config.guess.blur[currentLvl-1]}px); border-radius:10px; margin-bottom:15px; border:4px solid var(--teal); transition:0.5s;">
                             <div id="opts" style="display:grid; gap:8px; grid-template-columns:1fr 1fr;"></div>`;
            let opts = [book.n, ...books.filter(x=>x.n!=book.n).sort(()=>0.5-Math.random()).slice(0,3).map(x=>x.n)].sort();
            opts.forEach(o => {
                const btn = document.createElement('button'); btn.className = 'menu-btn'; btn.innerText = o;
                btn.onclick = () => { 
                    if(o === book.n) { 
                        document.getElementById('guess-img').style.filter = "none";
                        score += 50 + (sec * 8); setTimeout(nextLevel, 800); 
                    } else { finish(`خطأ! الكتاب هو: ${book.n}`); } 
                };
                document.getElementById('opts').appendChild(btn);
            });
        }
    }

    function nextLevel() {
        if(currentLvl < 3) { currentLvl++; loadGame(); }
        else finish("🏆 عبقري! أتممت التحدي بنجاح مذهل.");
    }

    function finish(msg) {
        clearInterval(timer);
        const rank = updateLeaderboard(playerName, score);
        showFinalScreen(msg, rank);
    }

    function updateLeaderboard(n, s) {
        let b = JSON.parse(localStorage.getItem('adab_leaderboard_2026') || '[]');
        b.push({n, s, t: Date.now()}); 
        b.sort((x,y) => y.s - x.s);
        localStorage.setItem('adab_leaderboard_2026', JSON.stringify(b.slice(0, 10)));
        return b.findIndex(i => i.n === n && i.s === s) + 1;
    }

    function showFinalScreen(msg, rank) {
        let coupon = "READ10", discount = "10%";
        if(rank === 1) { coupon = "WIN30"; discount = "30%"; }
        else if(rank === 2) { coupon = "WIN20"; discount = "20%"; }
        else if(rank === 3) { coupon = "WIN15"; discount = "15%"; }

        let html = `<h2 style="color:var(--burgundy); margin:0;">${msg}</h2>
                    <p style="font-weight:bold; color:var(--teal)">اللاعب: ${playerName} | نقاطك: ${score}</p>
                    <div class="coupon-box">
                        <p style="margin:0; color:#856404; font-weight:bold;">المركز الذي حققته: ${rank}</p>
                        <h1 style="margin:10px 0; color:var(--burgundy); letter-spacing:3px;">${coupon}</h1>
                        <p style="margin:0; font-size:0.9rem;">كود خصم حصري بقيمة <b>${discount}</b></p>
                        <button class="copy-btn" onclick="copyText('${coupon}')">نسخ الكود 📋</button>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="share-btn" style="flex:1;" onclick="shareWA('${coupon}', ${score}, ${rank})">واتساب 💬</button>
                        <button class="menu-btn" style="flex:1; margin:10px 0 0 0;" onclick="window.open('https://adab-book.com','_blank')">المتجر 🛒</button>
                    </div>`;
        
        let b = JSON.parse(localStorage.getItem('adab_leaderboard_2026') || '[]');
        html += `<h3 style="margin:20px 0 10px 0; color:var(--teal);">🏆 أفضل 5 متسابقين</h3><table class="lb-table"><tr><th>المركز</th><th>الاسم</th><th>النقاط</th></tr>`;
        b.slice(0, 5).forEach((i, idx) => {
            html += `<tr class="${i.n === playerName && idx+1 === rank ? 'highlight' : ''}"><td>${idx+1}</td><td>${i.n}</td><td>${i.s}</td></tr>`;
        });
        html += `</table><button class="menu-btn" onclick="location.reload()" style="margin-top:20px; background:var(--teal); color:white;">لعب مرة أخرى 🔄</button>`;
        
        document.getElementById('game-content').innerHTML = html;
        document.getElementById('timer-line').parentElement.style.display = 'none';
        document.querySelector('.stats-header').style.display = 'none';
    }

    function copyText(txt) {
        navigator.clipboard.writeText(txt);
        alert("تم نسخ الكود! استخدمه في موقع أدب بوك.");
    }

    function shareWA(c, s, r) {
        const text = `🔥 حققت ${s} نقطة في تحدي مركز الأدب العربي وحصلت على المركز ${r}! كودي هو [${c}]. جرب حظك الآن! 📚`;
        window.open(`https://adab-book.com/{encodeURIComponent(text)}`, '_blank');
    }
</script>
</body>
</html>
