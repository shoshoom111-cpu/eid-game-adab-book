<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مهرجان ألعاب مركز الأدب العربي ⚡</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --teal: #1a9397; --burgundy: #a11f2a; --gold: #c6922a; --bg: #fdfcf9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .main-card { background: white; padding: 1.5rem; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); width: 92%; max-width: 420px; text-align: center; border-top: 12px solid var(--teal); position: relative; max-height: 95vh; overflow-y: auto; }
        .name-field { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #ddd; text-align: center; font-size: 1.1rem; margin: 10px 0; outline: none; font-weight: bold; }
        .menu-btn { background: white; color: var(--teal); border: 2.5px solid var(--teal); padding: 12px; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        .menu-btn:hover:not(:disabled) { background: var(--teal); color: white; }
        .menu-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .stats-header { display: flex; justify-content: space-around; padding: 10px; background: #f0fafa; border-radius: 12px; margin-bottom: 15px; font-size: 0.85rem; color: var(--teal); font-weight: bold; }
        .timer-container { background: #eee; height: 8px; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        #timer-line { height: 100%; background: var(--teal); width: 100%; transition: 1s linear; }
        .grid { display: grid; gap: 8px; justify-content: center; margin: 0 auto; }
        .m-card { width: 75px; height: 105px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1.5px solid #eee; }
        .back { background: var(--teal); border: 2px solid white; }
        .front { background: white; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .front img { width: 100%; height: 100%; object-fit: cover; }
        .puzzle-grid { display: grid; gap: 2px; margin: 0 auto; background: #ddd; border: 3px solid var(--teal); }
        .puzzle-piece { background-size: 240px 320px; cursor: pointer; }
        .selected-piece { outline: 4px solid var(--gold); z-index: 10; }
        .coupon-box { background: #fff9e6; border: 2px dashed var(--gold); padding: 15px; border-radius: 15px; margin: 15px 0; }
        .lb-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .lb-table th { background: var(--teal); color: white; padding: 10px; }
        .lb-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .highlight { background: #e0f2f2; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

<div class="main-card">
    <div id="home">
        <img src="https://ibharbooks.com/cdn/shop/collections/markez-adab.png?v=1738877582&width=1024 style="width: 100%; max-width: 250px; margin-bottom: 10px;">
        <h2 style="color: var(--burgundy); margin: 0;">تحدي للقراء </h2>
        <p id="tries-text" style="font-size: 0.9rem; color: var(--teal); font-weight: bold; margin: 10px 0;"></p>
        <input type="text" id="player-name" class="name-field" placeholder="ادخل اسمك ..." maxlength="12" oninput="validateInput()">
        <div id="main-menu">
            <button class="menu-btn" id="btn-memory" onclick="startFlow('memory')" disabled>🃏 ذاكرة الأغلفة</button>
            <button class="menu-btn" id="btn-puzzle" onclick="startFlow('puzzle')" disabled>🧩 لغز التركيب</button>
            <button class="menu-btn" id="btn-guess" onclick="startFlow('guess')" disabled>📚 خمن الإصدار</button>
        </div>
        <p id="limit-msg" style="color: red; font-size: 0.85rem; display: none;">استنفدت محاولاتك لليوم!</p>
    </div>

    <div id="game-area" style="display: none;">
        <div class="stats-header">
            <span>اللاعب: <span id="p-display" style="color:var(--burgundy)"></span></span>
            <span>مرحلة: <span id="lvl-num">1</span>/3</span>
            <span>⭐ <span id="score-num">0</span></span>
        </div>
        <div class="timer-container"><div id="timer-line"></div></div>
        <div id="game-content"></div>
    </div>
</div>

<script>
    const books = [
       
        { n: "متلازمة فريجولي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/5de7db3d-393a-4443-a7d9-38a313196d3d.jpg" },
        { n: "شجرة العهد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/dc433276-1d38-4214-9e39-041c675d42e1.jpg" },
        { n: "خوف", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/ffc54c3e-9843-4401-be4c-e69329593574.png" },
        { n: "بيتشيني", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/83aea5be-3950-4056-b793-be588d6d6fd8.jpg" },
        { n: "قصّاص", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/32a21b7b-f3c9-400a-bb27-9c104f13f32a.png" },
        { n: "الغيهب", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0ef78de9-8505-472e-867e-0889f360e5f9.jpg" },
        { n: "لأنها كيارا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0579a21c-9a8a-4110-a706-d11747f904cb.png" },
        { n: "قوت", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd25b623-314d-4d3c-9b40-04f32216e854.jpg" },
        { n: "عزير", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/0691769a-513b-4e54-8d36-f68ac0f80a1a.png" },
        { n: "بيت الخناس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/679c4645-834e-42f9-a351-8cde94d5a123.png" },
        { n: "حسناء الدم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/c32925e4-2631-4e5f-8041-2097e8b1c36b.jpg" },
        { n: "طائفة الشعيبة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a178864f-98f0-4682-b36e-c21344d49f96.png" },
        { n: "جمنون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/8d3a83f9-7dd5-4939-88d2-31aaa09c4119.jpg" },
        { n: "لج", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/95e264c6-5f16-4d89-b6fa-11bd8866bcda.png" },
        { n: "فندق المقبرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/27ee3566-761c-40f1-b5eb-37df72dd242e.png" },
        { n: "هلاك مبهم", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/795aee56-ca9c-45f5-a686-5ee25b243456.jpg" },
        { n: "خربوشة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/80fc325c-722c-47cb-9b4d-d5c7d6642b83.png" },
        { n: "إخلاد", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/b8f4b8bc-40a4-477e-a6d0-395053b6e192.jpg" },
        { n: "سكاى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/6485a3a0-8234-4623-b9f8-21b80ccfb175.jpg" },
        { n: "زيروس", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/7c8a684e-81a3-4875-9182-41328fd2c313.jpg" },
        { n: "اكاسيا", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/625d085f-9b81-4e5f-ab85-b26c08a8bafb.png" },
        { n: "الممر الرابع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/62c01320-e152-4dfd-a780-07aa439264e4.jpg" },
        { n: "ذكريات ومخبوزات", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/16c54ecf-6295-47fd-bd62-ab2d13d61426.png" },
        { n: "بصمة مبهرة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/da7534a6-eb04-49c4-841a-4f556322eaed.jpg" },
        { n: "فردوس بوعلي", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/edc7725c-73f7-443f-a7b1-872502d3b4c3.jpg" },
        { n: "فندق السيد إنسان", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/97e24005-045e-4ea3-be60-531d1f165259.jpg" }, 
        { n: "الأعمدة والكجة", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/cd3e1d97-4baa-4d29-93ac-a9dbb677cc48.jpg" },
        { n: "نحن موتى", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/a9bf694e-1c06-4b78-91f4-fc3565077f3e.jpg" },
        { n: "مذكرات محامية", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/18bdeeb2-e433-4ee3-a1a2-1e1cbcd7639d.jpg" },
        { n: "هجرة مزارع", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/999e6b0b-cdb9-4f58-a992-a97a68bcddfe.jpg" },
        { n: "البارون", i: "https://media.zid.store/6052bbcf-b8c0-410f-908a-5a67cebb4c73/fdf02b08-b4cb-4e4d-b594-804bad8cf800.jpg" }

    ];

    let score = 0, currentLvl = 1, sec = 30, timer, playerName = "", currentGame = "", selectedPiece = null;
    
    // تم إصلاح المصفوفة ووضع قيم الصعوبة لكل مرحلة
    const config = {
        memory: { times: [40, 30, 20], pairs: [3, 4, 5], cols: [3, 4, 4] },
        puzzle: { times: [60, 45, 30], sizes: [2, 3, 4] },
        guess:  { times: [30, 20, 15], blur: [8, 18, 28] }
    };

    function initApp() {
        const today = new Date().toDateString();
        let tries = JSON.parse(localStorage.getItem('adab_limit_final') || '{"date":"","count":0}');
        if (tries.date !== today) tries = { date: today, count: 0 };
        localStorage.setItem('adab_limit_final', JSON.stringify(tries));
        document.getElementById('tries-text').innerText = `المحاولات المتبقية: ${3 - tries.count}`;
        if (tries.count >= 3) {
            document.getElementById('player-name').disabled = true;
            document.getElementById('limit-msg').style.display = 'block';
        }
    }

    function validateInput() {
        const val = document.getElementById('player-name').value.trim();
        const tries = JSON.parse(localStorage.getItem('adab_limit_final'));
        const isValid = val.length >= 2 && tries.count < 3;
        ['btn-memory', 'btn-puzzle', 'btn-guess'].forEach(id => document.getElementById(id).disabled = !isValid);
    }

    function startFlow(type) {
        let tries = JSON.parse(localStorage.getItem('adab_limit_final'));
        tries.count++;
        localStorage.setItem('adab_limit_final', JSON.stringify(tries));
        playerName = document.getElementById('player-name').value.trim();
        score = 0; currentLvl = 1; currentGame = type;
        document.getElementById('home').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('p-display').innerText = playerName;
        loadGame();
    }

    function loadGame() {
        clearInterval(timer);
        selectedPiece = null;
        document.getElementById('lvl-num').innerText = currentLvl;
        document.getElementById('score-num').innerText = score;
        sec = config[currentGame].times[currentLvl - 1];
        renderContent();
        timer = setInterval(() => {
            sec--;
            document.getElementById('timer-line').style.width = (sec/config[currentGame].times[currentLvl-1]*100) + "%";
            if (sec <= 0) finish("انتهى الوقت! حاول مرة أخرى.");
        }, 1000);
    }

    function renderContent() {
        const div = document.getElementById('game-content'); div.innerHTML = "";
        
        if (currentGame === 'memory') {
            const pCount = config.memory.pairs[currentLvl-1];
            let cards = [...books.slice(0, pCount), ...books.slice(0, pCount)].sort(() => 0.5-Math.random());
            const grid = document.createElement('div');
            grid.className = 'grid'; grid.style.gridTemplateColumns = `repeat(3, 1fr)`;
            let flipped = [], matched = 0;
            cards.forEach(b => {
                const c = document.createElement('div'); c.className = 'm-card';
                c.innerHTML = `<div class="card-inner"><div class="face back"></div><div class="face front"><img src="${b.i}"></div></div>`;
                c.onclick = () => {
                    if(flipped.length < 2 && !c.classList.contains('flipped')) {
                        c.classList.add('flipped'); flipped.push({c, b});
                        if(flipped.length === 2) {
                            if(flipped[0].b.n === flipped[1].b.n) {
                                matched++; score += 30 + (sec*2); flipped = [];
                                if(matched === pCount) setTimeout(nextLevel, 600);
                            } else { setTimeout(() => { flipped.forEach(x => x.c.classList.remove('flipped')); flipped = []; }, 600); }
                        }
                    }
                };
                grid.appendChild(c);
            });
            div.appendChild(grid);
        } else if (currentGame === 'puzzle') {
            const size = config.puzzle.sizes[currentLvl-1];
            const book = books[Math.floor(Math.random()*books.length)];
            const pGrid = document.createElement('div');
            pGrid.className = 'puzzle-grid'; pGrid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            pGrid.style.width = '240px';
            let pieces = Array.from({length: size*size}, (_, i) => i).sort(() => 0.5-Math.random());
            pieces.forEach((pos, idx) => {
                const p = document.createElement('div'); p.className = 'puzzle-piece';
                p.style.width = `${240/size}px`; p.style.height = `${320/size}px`;
                p.style.backgroundImage = `url(${book.i})`;
                p.style.backgroundPosition = `${-(pos % size) * (240/size)}px ${-Math.floor(pos / size) * (320/size)}px`;
                p.dataset.orig = pos;
                p.onclick = () => {
                    if(!selectedPiece) { selectedPiece = p; p.style.outline = "3px solid gold"; }
                    else {
                        let tmpBg = p.style.backgroundPosition, tmpO = p.dataset.orig;
                        p.style.backgroundPosition = selectedPiece.style.backgroundPosition;
                        p.dataset.orig = selectedPiece.dataset.orig;
                        selectedPiece.style.backgroundPosition = tmpBg;
                        selectedPiece.dataset.orig = tmpO;
                        selectedPiece.style.outline = "none"; selectedPiece = null;
                        if([...pGrid.children].every((pc, i) => parseInt(pc.dataset.orig) === i)) { score += 50 + (sec*5); setTimeout(nextLevel, 600); }
                    }
                };
                pGrid.appendChild(p);
            });
            div.appendChild(pGrid);
        } else if (currentGame === 'guess') {
            const book = books[Math.floor(Math.random()*books.length)];
            div.innerHTML = `<img src="${book.i}" style="width:160px; filter:blur(${config.guess.blur[currentLvl-1]}px); border-radius:10px; margin-bottom:15px; border:3px solid var(--teal);">
                             <div id="opts" style="display:grid; gap:8px; grid-template-columns:1fr 1fr;"></div>`;
            let opts = [book.n, ...books.filter(x=>x.n!=book.n).slice(0,3).map(x=>x.n)].sort();
            opts.forEach(o => {
                const btn = document.createElement('button'); btn.className = 'menu-btn'; btn.innerText = o;
                btn.onclick = () => { if(o === book.n) { score += 50 + (sec*5); nextLevel(); } else { finish("إجابة خاطئة!"); } };
                document.getElementById('opts').appendChild(btn);
            });
        }
    }

    function nextLevel() {
        if(currentLvl < 3) { currentLvl++; loadGame(); }
        else finish("🏆 تم التحدي بنجاح مذهل!");
    }

    function finish(msg) {
        clearInterval(timer);
        const rank = updateLeaderboard(playerName, score);
        showFinalScreen(msg, rank);
    }

    function updateLeaderboard(n, s) {
        let b = JSON.parse(localStorage.getItem('adab_lb_final') || '[]');
        b.push({n, s}); b.sort((x,y) => y.s - x.s);
        localStorage.setItem('adab_lb_final', JSON.stringify(b.slice(0, 10)));
        return b.findIndex(i => (i.n === n && i.s === s)) + 1;
    }

        function showFinalScreen(msg, rank) {
        // نظام الخصومات الجديد: تدرج للأوائل و 5% لكل من ينهي اللعبة
        let coupon = "GIFT5", discount = "5%"; 
        
        if (rank === 1) { coupon = "WIN30"; discount = "30%"; }
        else if (rank === 2) { coupon = "WIN20"; discount = "20%"; }
        else if (rank === 3) { coupon = "WIN15"; discount = "15%"; }
        // إذا لم يكن من الثلاثة الأوائل لكنه أنهى المراحل (msg يحتوي على كلمة نجاح)
        else if (msg.includes("نجاح") || msg.includes("مبروك")) { coupon = "GIFT5"; discount = "5%"; }

        let html = `<h2 style="color:var(--burgundy)">${msg}</h2>
                    <p style="font-weight:bold;">اللاعب: ${playerName} | نقاطك: ${score}</p>
                    <div class="coupon-box">
                        <p style="margin:0; font-weight:bold;">المركز الحالي: ${rank}</p>
                        <h1 style="margin:5px 0; color:var(--teal)">${coupon}</h1>
                        <p style="margin:0;">لقد حصلت على كود خصم بقيمة <b>${discount}</b></p>
                    </div>`;
        
        let b = JSON.parse(localStorage.getItem('adab_lb_final') || '[]');
        html += `<h3>🏆 قائمة المتصدرين ال 5)</h3><table class="lb-table">`;
        b.slice(0, 5).forEach((i, idx) => {
            html += `<tr class="${i.n === playerName ? 'highlight' : ''}"><td>${idx+1}</td><td>${i.n}</td><td>${i.s}</td></tr>`;
        });
        html += `</table><button class="menu-btn" onclick="location.reload()" style="margin-top:15px; background:var(--teal); color:white;">العودة للرئيسية</button>`;
        
        document.getElementById('game-content').innerHTML = html;
        document.getElementById('timer-line').parentElement.style.display = 'none';
        document.querySelector('.stats-header').style.display = 'none';
    }

</script>
</body>
</html>
